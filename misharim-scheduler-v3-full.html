const GEMATRIA = {
  1:"א'",2:"ב'",3:"ג'",4:"ד'",5:"ה'",6:"ו'",7:"ז'",8:"ח'",9:"ט'",
  10:"י'",11:'י"א',12:'י"ב',13:'י"ג',14:'י"ד',15:'ט"ו',16:'ט"ז',
  17:'י"ז',18:'י"ח',19:'י"ט',20:"כ'",21:'כ"א',22:'כ"ב',23:'כ"ג',
  24:'כ"ד',25:'כ"ה',26:'כ"ו',27:'כ"ז',28:'כ"ח',29:'כ"ט',30:"ל'"
};

const WEEKDAYS_HEB = ["א'","ב'","ג'","ד'","ה'","ו'","ש'"];
const MONTHS_HEB = ['ספטמבר','אוקטובר','נובמבר','דצמבר','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט'];
const HEBREW_YEAR_NAMES = {5784:"תשפ\"ד",5785:"תשפ\"ה",5786:"תשפ\"ו",5787:"תשפ\"ז",5788:"תשפ\"ח",5789:"תשפ\"ט",5790:"תש\"צ",5791:"תשצ\"א"};

const hebDateFmt = new Intl.DateTimeFormat('en-u-ca-hebrew', { day:'numeric', month:'long', year:'numeric' });
const islamicDateFmt = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', { day:'numeric', month:'long', year:'numeric' });

function getHebrewDate(date) {
  try {
    const parts = hebDateFmt.formatToParts(date);
    const day = parseInt(parts.find(p => p.type === 'day')?.value) || 0;
    const month = parts.find(p => p.type === 'month')?.value || '';
    const yearStr = parts.find(p => p.type === 'year')?.value || '';
    const year = parseInt(yearStr.replace(/[^0-9]/g, '')) || 0;
    return { day, month, year };
  } catch { return { day: 0, month: '', year: 0 }; }
}

function getIslamicDate(date) {
  try {
    const parts = islamicDateFmt.formatToParts(date);
    const day = parseInt(parts.find(p => p.type === 'day')?.value) || 0;
    const month = parts.find(p => p.type === 'month')?.value || '';
    return { day, month };
  } catch { return { day: 0, month: '' }; }
}

function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function fmtDate(isoStr) { const [y,m,d] = isoStr.split('-'); return `${d}/${m}/${y}`; }
function jsWeekday(d) { return d.getDay(); } // 0=Sun, 6=Sat
function isFriday(d) { return jsWeekday(d) === 5; }
function isShabbat(d) { return jsWeekday(d) === 6; }
function hebWeekday(d) { return WEEKDAYS_HEB[jsWeekday(d)]; }

const MEMORIAL_DAYS = {

function generateHolidays(gregStartYear) {
  const holidays = {};
  const start = new Date(gregStartYear, 8, 1);
  const end = new Date(gregStartYear + 1, 7, 31);

  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
    const key = dateKey(d);
    const heb = getHebrewDate(d);
    const isl = getIslamicDate(d);
    let entries = [];

    // Jewish holidays
    const jewMonth = JEWISH_HOLIDAYS_DB[heb.month];
    if (jewMonth && jewMonth[heb.day]) {
      entries.push({ name: jewMonth[heb.day], type: 'jewish' });
    }

    // Erev Rosh Hashana
    if (heb.month === 'Elul' && heb.day === 29) {
      entries.push({ name: 'ערב ר"ה', type: 'jewish' });
    }
    // Erev Yom Kippur
    if (heb.month === 'Tishri' && heb.day === 9) {
      entries.push({ name: 'עיו"כ', type: 'jewish' });
    }

    // Islamic holidays
    const islMonth = ISLAMIC_HOLIDAYS_DB[isl.month];
    if (islMonth && islMonth[isl.day]) {
      entries.push({ name: islMonth[isl.day], type: 'arab' });
    }

    // Druze holidays
    for (const dh of DRUZE_HOLIDAYS_FIXED) {
      if (d.getMonth() + 1 === dh.month && d.getDate() === dh.day) {
        entries.push({ name: dh.name, type: 'druze' });
      }
    }

    // Arab & Druze multi-day holidays
    for (const adh of ARAB_DRUZE_HOLIDAYS_FIXED) {
      if (d.getMonth() + 1 === adh.month && adh.days && adh.days.includes(d.getDate())) {
        const type = adh.name.includes('דרוזית') ? 'druze' : 'arab';
        entries.push({ name: adh.name, type });
      }
    }

    // Memorial days
    const mmdd = `${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (MEMORIAL_DAYS[mmdd]) {
      entries.push({ name: MEMORIAL_DAYS[mmdd], type: 'memorial' });
    }

    if (entries.length > 0) {
      holidays[key] = entries;
    }
  }
  return holidays;
}

// ============================================================
// GENERATE CALENDAR DATA FOR ACADEMIC YEAR
// ============================================================
function generateYearData(gregStartYear) {
  const months = [];
  for (let i = 0; i < 12; i++) {
    const year = i < 4 ? gregStartYear : gregStartYear + 1;
    const month = ((i + 8) % 12); // 8=Sep, 9=Oct, ... 7=Aug
    const firstDay = new Date(year, month, 1);
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const days = [];
    for (let d = 1; d <= daysInMonth; d++) {
      const date = new Date(year, month, d);
      const heb = getHebrewDate(date);
      days.push({
        date: dateKey(date),
        day: d,
        weekday: jsWeekday(date),
        hebDay: heb.day,
        hebMonth: heb.month,
        hebYear: heb.year,
        gematria: GEMATRIA[heb.day] || '',
        isFriday: isFriday(date),
        isShabbat: isShabbat(date),
        weekdayHeb: hebWeekday(date)
      });
    }
    months.push({
      year, month, name: MONTHS_HEB[i],
      firstDay, daysInMonth, days
    });
  }
  return months;
}

const GH_OWNER = 'misharim-tools';
const GH_REPO = 'scheduler';
const GH_FILE = 'data.json';
const GH_BRANCH = 'master';
const GH_API = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_FILE}`;

async function ghFetchData() {
  const res = await fetch(`${GH_API}?ref=${GH_BRANCH}&t=${Date.now()}`);
  if (res.status === 404) return null;
  if (!res.ok) throw new Error(`GitHub fetch failed: ${res.status}`);
  const json = await res.json();
  const bytes = Uint8Array.from(atob(json.content.replace(/\n/g, '')), c => c.charCodeAt(0));
  const content = new TextDecoder('utf-8').decode(bytes);
  return { data: JSON.parse(content), sha: json.sha };
}

async function ghPushData(data, sha, token) {
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const body = { message: `sync ${new Date().toISOString()}`, content, branch: GH_BRANCH };
  if (sha) body.sha = sha;
  const res = await fetch(GH_API, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const err = await res.json(); throw new Error(err.message || `Push failed: ${res.status}`); }
  const result = await res.json();
  return result.content.sha;
}

function mergeProjectData(remote, local) {
  if (!remote) return local;
  const merged = { ...remote };
  const remoteIds = new Set((remote.events || []).map(e => e.id));
  const localIds = new Set((local.events || []).map(e => e.id));
  const allEvents = [...(remote.events || [])];
  for (const evt of (local.events || [])) {
    if (!remoteIds.has(evt.id)) allEvents.push(evt);
  }
  merged.events = allEvents;
  merged.blockedDays = { ...(remote.blockedDays || {}), ...(local.blockedDays || {}) };
  merged.customHolidays = { ...(remote.customHolidays || {}), ...(local.customHolidays || {}) };
  merged.cancelledDates = { ...(remote.cancelledDates || {}), ...(local.cancelledDates || {}) };
  merged.postponedDates = { ...(remote.postponedDates || {}), ...(local.postponedDates || {}) };
  merged.cellNotes = { ...(remote.cellNotes || {}), ...(local.cellNotes || {}) };
  return merged;
}

function App() {

  const [events, setEvents] = useState(PRELOADED_EVENTS);
  const [blockedDays, setBlockedDays] = useState({});
  const [customHolidays, setCustomHolidays] = useState({});
  const [cancelledDates, setCancelledDates] = useState({}); // {eventId: {date: true}}

  const [selectedEvent, setSelectedEvent] = useState(null);
  const [activePanel, setActivePanel] = useState('events'); // events, hotel, ai, settings
  const [apiKey, setApiKey] = useState('');
  const [ghToken, setGhToken] = useState('');
  const [ghSha, setGhSha] = useState(null);
  const [syncStatus, setSyncStatus] = useState('idle');
  const [lastSync, setLastSync] = useState(null);
  const pendingSync = useRef(false);
  const [chatHistory, setChatHistory] = useState([]);
  const [chatInput, setChatInput] = useState('');
  const [isAiLoading, setIsAiLoading] = useState(false);
  const [showEventForm, setShowEventForm] = useState(false);
  const [editingEvent, setEditingEvent] = useState(null);
  const [formInitialDates, setFormInitialDates] = useState(null);
  const [selectedCell, setSelectedCell] = useState(null);
  const rangeStartRef = useRef(null);
  const clickTimerRef = useRef(null);
  const [tooltip, setTooltip] = useState(null);
  const [hoveredEventId, setHoveredEventId] = useState(null); // for Gantt highlight
  const [viewMode, setViewMode] = useState('year'); // 'year' or index 0-11 for monthly
  const [cellNotes, setCellNotes] = useState({}); // {date: "הערה"}
  const [showCellNoteDialog, setShowCellNoteDialog] = useState(false);
  const [cellNoteInput, setCellNoteInput] = useState('');
  const [hiddenHolidays, setHiddenHolidays] = useState({}); // {"date_name": true}
  const [showDayDialog, setShowDayDialog] = useState(false);
  const [dayDialogDate, setDayDialogDate] = useState(null);
  const [editingHoliday, setEditingHoliday] = useState(null); // {origDate, origName, origType, newName, newDate}
  const [draggedEvent, setDraggedEvent] = useState(null); // {eventId, sourceDate}
  const chatEndRef = useRef(null);

  const gregStartYear = hebrewYear - 3761; // approximate: 5787 -> 2026

  const yearData = useMemo(() => generateYearData(gregStartYear), [gregStartYear]);
  const holidays = useMemo(() => generateHolidays(gregStartYear), [gregStartYear]);

  // Merge custom holidays, filter hidden
  const allHolidays = useMemo(() => {
    const merged = {};
    for (const [date, hols] of Object.entries(holidays)) {
      const filtered = hols.filter(h => !hiddenHolidays[`${date}_${h.name}`]);
      if (filtered.length) merged[date] = filtered;
    }
    for (const [key, val] of Object.entries(customHolidays)) {
      if (hiddenHolidays[`${key}_${val.name}`]) continue;
      if (!merged[key]) merged[key] = [];
      merged[key] = [...merged[key], { name: val.name, type: val.type || 'custom' }];
    }
    return merged;
  }, [holidays, customHolidays, hiddenHolidays]);

  // Load: fetch from GitHub, fallback to localStorage
  useEffect(() => {
    const savedToken = localStorage.getItem('misharim_gh_token');
    if (savedToken) setGhToken(savedToken);
    const savedApiKey = localStorage.getItem('misharim_api_key');
    if (savedApiKey) setApiKey(savedApiKey);

    function applyData(data) {
      if (data.hebrewYear) setHebrewYear(data.hebrewYear);
      if (data.events && data.events.length > 0) setEvents(data.events);
      if (data.blockedDays) setBlockedDays(data.blockedDays);
      if (data.customHolidays) setCustomHolidays(data.customHolidays);
      if (data.cancelledDates) setCancelledDates(data.cancelledDates);
      if (data.postponedDates) setPostponedDates(data.postponedDates);
      if (data.cellNotes) setCellNotes(data.cellNotes);
      if (data.hiddenHolidays) setHiddenHolidays(data.hiddenHolidays);
      if (data.apiKey) setApiKey(data.apiKey);
    }

    setSyncStatus('loading');
    ghFetchData().then(result => {
      if (result) {
        applyData(result.data);
        setGhSha(result.sha);
        setLastSync(new Date());
        setSyncStatus('synced');
      } else {
        // No remote data yet — try localStorage
        try {
          const saved = localStorage.getItem('misharim_project');
          if (saved) applyData(JSON.parse(saved));
        } catch {}
        setSyncStatus('no-remote');
      }
    }).catch(() => {
      // GitHub unavailable — fall back to localStorage
      try {
        const saved = localStorage.getItem('misharim_project');
        if (saved) applyData(JSON.parse(saved));
      } catch {}
      setSyncStatus('offline');
    });
  }, []);

  // Auto-save
  useEffect(() => {
    const data = { hebrewYear, events, blockedDays, customHolidays, cancelledDates, postponedDates, apiKey, cellNotes, hiddenHolidays };
    localStorage.setItem('misharim_project', JSON.stringify(data));
  }, [hebrewYear, events, blockedDays, customHolidays, cancelledDates, postponedDates, apiKey, cellNotes]);

  // Get events for a specific date
  const getEventsForDate = useCallback((date) => {
    return events.filter(e => {
      if (cancelledDates[e.id]?.[date]) return false;
      // Check if date is in original dates or is a postponed-to date
      const isOriginal = e.dates.includes(date) && !postponedDates[e.id]?.[date];
      const isPostponedTo = Object.values(postponedDates[e.id] || {}).includes(date);
      return isOriginal || isPostponedTo;
    });
  }, [events, cancelledDates, postponedDates]);

  // Check conflicts for a date
  const getConflicts = useCallback((date) => {
    const conflicts = [];
    const d = parseDate(date);
    if (isShabbat(d)) conflicts.push({ type: 'shabbat', text: 'שבת' });
    if (isFriday(d)) conflicts.push({ type: 'friday', text: 'יום שישי' });
    if (allHolidays[date]) {
      for (const h of allHolidays[date]) {
        conflicts.push({ type: h.type, text: h.name });
      }
    }
    if (blockedDays[date]) conflicts.push({ type: 'blocked', text: `חסום: ${blockedDays[date]}` });
    return conflicts;
  }, [allHolidays, blockedDays]);

  // Smart date suggestions
  const suggestDates = useCallback((count, options = {}) => {
    const { monthRange, avoidWeekdays = [5, 6], preferWeekdays = [1, 2, 3] } = options;
    const suggestions = [];

    for (const monthData of yearData) {
      const monthIdx = yearData.indexOf(monthData) + 1;
      if (monthRange) {
        const [start, end] = monthRange.split('-').map(Number);
        if (monthIdx < start || monthIdx > end) continue;
      }

      for (const day of monthData.days) {
        if (avoidWeekdays.includes(day.weekday)) continue;
        if (allHolidays[day.date]) continue;
        if (blockedDays[day.date]) continue;

        const existingEvents = getEventsForDate(day.date);
        const score = (preferWeekdays.includes(day.weekday) ? 10 : 5) - existingEvents.length * 3;

        suggestions.push({ date: day.date, score, day: day.day, month: monthData.name, weekday: day.weekdayHeb });
      }
    }

    suggestions.sort((a, b) => b.score - a.score);
    return suggestions.slice(0, count * 3); // Return 3x options
  }, [yearData, allHolidays, blockedDays, getEventsForDate]);

  // ============================================================
  // RECURRING SERIES SUGGESTION ENGINE
  // ============================================================
  const suggestRecurringSeries = useCallback((count, frequency, options = {}) => {
    const { preferredDay, startMonthIdx = 0, endMonthIdx = 11 } = options;
    // frequency: 'weekly','bi-weekly','monthly','quarterly','custom'
    // preferredDay: 0=Sun..6=Sat (JS weekday)
    const avoidDays = [5, 6]; // Friday, Saturday
    const results = [];

    // Build flat list of candidate days within month range
    const candidates = [];
    for (let mi = startMonthIdx; mi <= endMonthIdx && mi < yearData.length; mi++) {
      const m = yearData[mi];
      for (const day of m.days) {
        if (avoidDays.includes(day.weekday)) continue;
        if (preferredDay !== undefined && preferredDay !== null && day.weekday !== preferredDay) continue;
        const hols = allHolidays[day.date];
        const blocked = blockedDays[day.date];
        const evts = getEventsForDate(day.date);
        const conflicts = [];
        if (hols) hols.forEach(h => conflicts.push({ type: h.type, text: h.name }));
        if (blocked) conflicts.push({ type: 'blocked', text: blocked });
        if (evts.length) evts.forEach(e => conflicts.push({ type: 'event', text: e.name }));
        candidates.push({ date: day.date, weekday: day.weekday, weekdayHeb: day.weekdayHeb, day: day.day, monthName: m.name, conflicts, monthIdx: mi });
      }
    }

    // Determine minimum gap in days between meetings
    const gapMap = { 'weekly': 5, 'bi-weekly': 12, 'monthly': 25, 'quarterly': 75, 'custom': 14 };
    const minGap = gapMap[frequency] || 25;

    // Greedy pick: choose best date for each slot
    let lastPickedDate = null;
    for (let i = 0; i < count; i++) {
      let best = null;
      let bestScore = -Infinity;
      let bestIdx = -1;

      for (let ci = 0; ci < candidates.length; ci++) {
        const c = candidates[ci];
        // Check gap from last picked
        if (lastPickedDate) {
          const diff = (parseDate(c.date) - parseDate(lastPickedDate)) / 86400000;
          if (diff < minGap) continue;
        }
        // Score: prefer no conflicts, prefer preferred day, spread evenly
        let score = 100;
        score -= c.conflicts.length * 30;
        if (preferredDay !== undefined && c.weekday === preferredDay) score += 15;
        // Prefer mid-week
        if ([1, 2, 3].includes(c.weekday)) score += 5;
        if (score > bestScore) { bestScore = score; best = c; bestIdx = ci; }
      }

      if (!best) break;

      // Find alternatives (3 nearby conflict-free dates)
      const alternatives = [];
      const bestDateMs = parseDate(best.date).getTime();
      for (const c of candidates) {
        if (c.date === best.date) continue;
        if (c.conflicts.length > 0) continue;
        const diff = Math.abs(parseDate(c.date).getTime() - bestDateMs) / 86400000;
        if (diff <= 14) alternatives.push(c);
        if (alternatives.length >= 3) break;
      }

      results.push({ ...best, alternatives, accepted: true });
      lastPickedDate = best.date;
      // Remove candidates before this + gap to avoid reuse
      candidates.splice(0, bestIdx + 1);
    }

    return results;
  }, [yearData, allHolidays, blockedDays, getEventsForDate]);

  // ============================================================
  // HEBREW FREE TEXT RECURRENCE PARSER
  // ============================================================
  const parseRecurrenceText = useCallback((text) => {
    const result = { count: null, frequency: null, preferredDay: null, startMonthIdx: null, endMonthIdx: null };
    const t = text.trim();

    // Extract count
    const countMatch = t.match(/(\d+)\s*(מפגשים|סמינרים|פעמים|מפגש|ישיבות|כנסים|פורומים)/);
    if (countMatch) result.count = parseInt(countMatch[1]);

    // Extract frequency
    if (/שבועי|כל שבוע/.test(t)) result.frequency = 'weekly';
    else if (/דו[- ]?שבועי|אחת לשבועיים|כל שבועיים/.test(t)) result.frequency = 'bi-weekly';
    else if (/חודשי|אחת לחודש|כל חודש|פעם בחודש/.test(t)) result.frequency = 'monthly';
    else if (/רבעוני|אחת לרבעון|כל רבעון/.test(t)) result.frequency = 'quarterly';

    // Extract preferred day
    const dayMap = { 'ראשון': 0, 'שני': 1, 'שלישי': 2, 'רביעי': 3, 'חמישי': 4 };
    const dayMatch = t.match(/(?:יום|ימי)\s+(ראשון|שני|שלישי|רביעי|חמישי)/);
    if (dayMatch) result.preferredDay = dayMap[dayMatch[1]];

    // Extract month range
    const monthNameMap = { 'ספטמבר': 0, 'אוקטובר': 1, 'נובמבר': 2, 'דצמבר': 3, 'ינואר': 4, 'פברואר': 5, 'מרץ': 6, 'אפריל': 7, 'מאי': 8, 'יוני': 9, 'יולי': 10, 'אוגוסט': 11 };
    const monthNames = Object.keys(monthNameMap).join('|');
    const rangeMatch = t.match(new RegExp(`(?:מ|בין)\\s*(${monthNames})\\s*(?:עד|ל|-)\\s*(${monthNames})`));
    if (rangeMatch) {
      result.startMonthIdx = monthNameMap[rangeMatch[1]];
      result.endMonthIdx = monthNameMap[rangeMatch[2]];
    }

    // Infer missing values
    if (!result.frequency && result.count) {
      if (result.count <= 4) result.frequency = 'quarterly';
      else if (result.count <= 12) result.frequency = 'monthly';
      else result.frequency = 'bi-weekly';
    }

    return result;
  }, []);

  // Add event
  const addEvent = useCallback((eventData) => {
    const newEvent = { id: uid(), ...eventData, hotel: eventData.hotel || {} };
    setEvents(prev => [...prev, newEvent]);
    pendingSync.current = true;
    return newEvent;
  }, []);

  // Remove event
  const removeEvent = useCallback((eventId) => {
    setEvents(prev => prev.filter(e => e.id !== eventId));
    setCancelledDates(prev => { const n = {...prev}; delete n[eventId]; return n; });
    setPostponedDates(prev => { const n = {...prev}; delete n[eventId]; return n; });
    pendingSync.current = true;
  }, []);

  // Cancel a specific date
  const cancelDate = useCallback((eventId, date) => {
    setCancelledDates(prev => ({
      ...prev,
      [eventId]: { ...(prev[eventId] || {}), [date]: true }
    }));
    pendingSync.current = true;
  }, []);

  // Postpone a date
  const postponeDate = useCallback((eventId, oldDate, newDate) => {
    setPostponedDates(prev => ({
      ...prev,
      [eventId]: { ...(prev[eventId] || {}), [oldDate]: newDate }
    }));
    pendingSync.current = true;
  }, []);

  // Block a day
  const blockDay = useCallback((date, reason) => {
    setBlockedDays(prev => ({ ...prev, [date]: reason }));
    pendingSync.current = true;
  }, []);

  // Unblock a day
  const unblockDay = useCallback((date) => {
    setBlockedDays(prev => { const n = {...prev}; delete n[date]; return n; });
    pendingSync.current = true;
  }, []);

  // Add custom holiday
  const addCustomHoliday = useCallback((date, name, type = 'custom') => {
    setCustomHolidays(prev => ({ ...prev, [date]: { name, type } }));
    pendingSync.current = true;
  }, []);

  // Remove custom holiday
  const removeCustomHoliday = useCallback((date) => {
    setCustomHolidays(prev => { const n = {...prev}; delete n[date]; return n; });
    pendingSync.current = true;
  }, []);


  // ============================================================
  // SAVE / LOAD / EXPORT
  // ============================================================
  const saveProject = useCallback(async () => {
    const timestamp = new Date().toLocaleString('he-IL', { timeZone: 'Asia/Jerusalem', hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit', year:'numeric' });
    const localData = {
      version: '1.0',
      savedAt: timestamp,
      savedAtISO: new Date().toISOString(),
      hebrewYear, events, blockedDays, customHolidays, cancelledDates, postponedDates, cellNotes, hiddenHolidays
    };

    try {

      const mergedData = mergeProjectData(remote?.data, localData);
      mergedData.savedAt = timestamp;
      mergedData.savedAtISO = new Date().toISOString();
      const newSha = await ghPushData(mergedData, remote?.sha || ghSha, token);
      setGhSha(newSha);
      setLastSync(new Date());
      setSyncStatus('synced');
