${blockedSummary || 'אין ימים חסומים'}

קטגוריות זמינות: ${Object.entries(CATEGORIES).map(([k,v]) => `${k}=${v.name}`).join(', ')}

תמיד ענה בעברית. השתמש בכלים כדי לבצע פעולות. כשמישהו שואל שאלת מידע (מתי/כמה/איפה) - ענה ישירות מהמידע שברשותך בלי להשתמש בכלים.`;
  }, [events, blockedDays, allHolidays, hebrewYear, gregStartYear]);

  const executeAiTool = useCallback((toolName, toolInput) => {
    switch (toolName) {
      case 'schedule_event': {
        const evt = addEvent({
          name: toolInput.name,
          category: toolInput.category || 'other',
          type: 'one-time',
          dates: toolInput.dates || [],
          participants: toolInput.participants || 0,
          notes: toolInput.notes || '',
          hotel: {}
        });
        return `אירוע "${evt.name}" שובץ בהצלחה ב-${evt.dates.length} תאריכים.`;
      }
      case 'remove_event': {
        const evt = events.find(e => e.id === toolInput.eventId);
        if (!evt) return 'אירוע לא נמצא';
        removeEvent(toolInput.eventId);
        return `אירוע "${evt.name}" הוסר.`;
      }
      case 'cancel_event_date': {
        cancelDate(toolInput.eventId, toolInput.date);
        return `תאריך ${toolInput.date} בוטל.`;
      }
      case 'postpone_event_date': {
        postponeDate(toolInput.eventId, toolInput.oldDate, toolInput.newDate);
        return `תאריך נדחה מ-${toolInput.oldDate} ל-${toolInput.newDate}.`;
      }
      case 'bulk_postpone_dates': {
        const evt = events.find(e => e.id === toolInput.eventId);
        if (!evt) return 'אירוע לא נמצא';
        const datesToPostpone = evt.dates.filter(d => d >= toolInput.fromDate);
        if (datesToPostpone.length === 0) return `לא נמצאו תאריכים החל מ-${toolInput.fromDate}`;
        datesToPostpone.forEach((oldDate, idx) => {
          const newDate = toolInput.newDates[idx];
          if (newDate) postponeDate(toolInput.eventId, oldDate, newDate);
        });
        return `דחוי ${datesToPostpone.length} תאריכים של "${evt.name}" החל מ-${toolInput.fromDate}.`;
      }
      case 'shift_dates': {
        const evt = events.find(e => e.id === toolInput.eventId);
        if (!evt) return 'אירוע לא נמצא';
        const daysDelta = toolInput.days;
        evt.dates.forEach(date => {
          const d = parseDate(date);
          d.setDate(d.getDate() + daysDelta);
          const newDate = dateKey(d);
          postponeDate(toolInput.eventId, date, newDate);
        });
        return `הסטת ${evt.dates.length} תאריכים של "${evt.name}" ב-${daysDelta} ימים.`;
      }
      case 'block_day': {
        blockDay(toolInput.date, toolInput.reason);
        return `יום ${toolInput.date} נחסם: ${toolInput.reason}`;
      }
      case 'suggest_dates': {
        const suggestions = suggestDates(toolInput.count || 3, {
          monthRange: toolInput.monthRange,
          avoidWeekdays: toolInput.avoidWeekdays,
          preferWeekdays: toolInput.preferWeekdays
        });
        return `הצעות תאריכים:\n${suggestions.slice(0, 10).map((s, i) =>
          `${i+1}. ${s.date} (${s.weekday}, ${s.month})`
        ).join('\n')}`;
      }
      case 'get_schedule_info': {
        if (toolInput.query === 'events') {
          return events.map(e => {
            let line = `${e.name}: ${e.dates.join(', ')}`;
            if (e.participants) line += ` (${e.participants} משתתפים)`;
            if (e.notes) line += ` - ${e.notes}`;
            return line;
          }).join('\n') || 'אין אירועים';
        }
        if (toolInput.query === 'month_summary' && toolInput.month) {
          const m = yearData[toolInput.month - 1];
          if (!m) return 'חודש לא נמצא';
          const monthEvents = events.filter(e => e.dates.some(d => {
            const pd = parseDate(d);
            return pd.getMonth() === m.month && pd.getFullYear() === m.year;
          }));
          const monthHols = m.days.filter(day => allHolidays[day.date]).map(day => `${day.day}/${m.month+1}: ${allHolidays[day.date].map(h=>h.name).join(', ')}`);
          return `${m.name} ${m.year}: ${monthEvents.length} אירועים\nאירועים:\n${monthEvents.map(e => `- ${e.name} (${e.dates.filter(d => { const pd = parseDate(d); return pd.getMonth() === m.month; }).map(d => fmtDate(d)).join(', ')})`).join('\n')}\nחגים:\n${monthHols.join('\n') || 'אין חגים'}`;
        }
        if (toolInput.query === 'holidays') {
          const entries = Object.entries(allHolidays).sort(([a],[b]) => a.localeCompare(b));
          if (toolInput.month) {
            const m = yearData[toolInput.month - 1];
            if (!m) return 'חודש לא נמצא';
            const filtered = entries.filter(([d]) => { const pd = parseDate(d); return pd.getMonth() === m.month && pd.getFullYear() === m.year; });
            return `חגים ב${m.name}:\n${filtered.map(([d, hols]) => `${fmtDate(d)}: ${hols.map(h=>h.name).join(', ')}`).join('\n') || 'אין חגים'}`;
          }
          return entries.map(([d, hols]) => `${fmtDate(d)}: ${hols.map(h=>h.name).join(', ')}`).join('\n');
        }
        if (toolInput.query === 'event_details') {
          const search = (toolInput.eventName || '').toLowerCase();
          const evt = events.find(e => e.id === search || e.name.toLowerCase().includes(search));
          if (!evt) return `לא נמצא אירוע "${toolInput.eventName}"`;
          const h = evt.hotel || {};
          const eqMap = { projector: 'מקרן', whiteboard: 'לוח מחיק', flipchart: 'פליפצ\'רט', stationery: 'כלי כתיבה' };
          const equipStr = (h.equipment || []).map(k => eqMap[k] || k).join(', ') || '-';
          return `שם: ${evt.name}\nקטגוריה: ${CATEGORIES[evt.category]?.name}\nתאריכים: ${evt.dates.map(d => fmtDate(d)).join(', ') || 'לא שובצו'}\nמשתתפים: ${evt.participants || 'לא צוין'}\nהערות: ${evt.notes || 'אין'}\nמלון - אזור: ${h.area || 'לא צוין'}, אנשים: ${h.people || '-'}, לילות: ${h.nights || '-'}, חדרים יחיד: ${h.roomsSingle || '-'}, חדרים זוגי: ${h.roomsDouble || '-'}, איכות: ${h.quality || '-'}, כיבוד: ${h.catering || '-'}, דרישות: ${h.requirements || '-'}\nפיצולים: ${h.breakoutRooms || '-'}, סידור חדר: ${h.seatingArrangement || '-'}, עזרים: ${equipStr}, עזרים נוספים: ${h.equipmentNotes || '-'}`;
        }
        if (toolInput.query === 'date_info' && toolInput.date) {
          const d = toolInput.date;
          const pd = parseDate(d);
          const heb = getHebrewDate(pd);
          const hols = allHolidays[d];
          const dayEvents = getEventsForDate(d);
          const blocked = blockedDays[d];
          let info = `תאריך: ${fmtDate(d)} (${hebWeekday(pd)})\nתאריך עברי: ${heb.day} ${heb.month} ${heb.year}`;
          if (hols) info += `\nחגים: ${hols.map(h=>h.name).join(', ')}`;
          if (blocked) info += `\nחסום: ${blocked}`;
          if (dayEvents.length) info += `\nאירועים: ${dayEvents.map(e=>e.name).join(', ')}`;
          if (!hols && !blocked && !dayEvents.length) info += `\nיום פנוי`;
          return info;
        }
        return 'שאילתה לא מזוהה. סוגי שאילתות: events, holidays, month_summary, event_details, date_info';
      }
      case 'update_hotel': {
        setEvents(prev => prev.map(e =>
          e.id === toolInput.eventId ? { ...e, hotel: { ...e.hotel, ...toolInput.hotel } } : e
        ));
        pendingSync.current = true;
        return 'פרטי מלון עודכנו.';
      }
      default: return 'כלי לא מוכר';
    }
  }, [events, addEvent, removeEvent, cancelDate, postponeDate, blockDay, suggestDates, yearData, allHolidays, blockedDays, getEventsForDate]);

  const sendAiMessage = useCallback(async (message) => {
    if (!apiKey) { alert('נא להזין API Key בהגדרות'); return; }

    const newHistory = [...chatHistory, { role: 'user', content: message }];
    setChatHistory(newHistory);
    setChatInput('');
    setIsAiLoading(true);

    try {
      const messages = newHistory.map(m => ({ role: m.role, content: m.content }));

      let response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 2048,
          system: buildSystemContext(),
          tools: AI_TOOLS,
          messages
        })
      });

      let data = await response.json();

      let toolResults = [];
      while (data.stop_reason === 'tool_use') {
        const toolBlocks = data.content.filter(c => c.type === 'tool_use');
        const textBlocks = data.content.filter(c => c.type === 'text');

        toolResults = toolBlocks.map(tb => ({
          type: 'tool_result',
          tool_use_id: tb.id,
          content: executeAiTool(tb.name, tb.input)
        }));

        const continuedMessages = [
          ...messages,
          { role: 'assistant', content: data.content },
          { role: 'user', content: toolResults }
        ];

        response = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true'
          },
          body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 2048,
            system: buildSystemContext(),
            tools: AI_TOOLS,
            messages: continuedMessages
          })
        });
        data = await response.json();
      }

      const aiText = data.content?.filter(c => c.type === 'text').map(c => c.text).join('\n') || 'לא התקבלה תשובה';
      setChatHistory(prev => [...prev, { role: 'assistant', content: aiText }]);

    } catch (err) {
      setChatHistory(prev => [...prev, { role: 'assistant', content: `שגיאה: ${err.message}` }]);
    } finally {
      setIsAiLoading(false);
    }
  }, [apiKey, chatHistory, buildSystemContext, executeAiTool]);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [chatHistory]);

  // ============================================================
  // CELL CLICK HANDLER
  // ============================================================
  const handleCellClick = useCallback((date, e) => {
    if (e.shiftKey) {
      if (blockedDays[date]) {
        unblockDay(date);
      } else {
        const reason = prompt('סיבת חסימה:');
        if (reason) blockDay(date, reason);
      }
      return;
    }

    if (e.ctrlKey || e.metaKey) {
      const name = prompt('שם החג/אירוע:');
      if (name) addCustomHoliday(date, name);
      return;
    }

    if (clickTimerRef.current) clearTimeout(clickTimerRef.current);
    clickTimerRef.current = setTimeout(() => {
      clickTimerRef.current = null;
      rangeStartRef.current = date;
      setSelectedCell(date);

      if (selectedEvent) {
        const conflicts = getConflicts(date);
        if (conflicts.length > 0) {
          const proceed = confirm(`התראה! תאריך ${date} חופף ל:\n${conflicts.map(c => c.text).join('\n')}\n\nלהמשיך?`);
          if (!proceed) return;
        }
        setEvents(prev => prev.map(evt =>
          evt.id === selectedEvent.id
            ? { ...evt, dates: [...new Set([...evt.dates, date])] }
            : evt
        ));
        pendingSync.current = true;
      }
    }, 250);
  }, [selectedEvent, blockedDays, blockDay, unblockDay, addCustomHoliday, getConflicts]);

  // Handle cell note dialog
  const handleOpenCellNoteDialog = useCallback((date) => {
    setSelectedCell(date);
    setCellNoteInput(cellNotes[date] || '');
    setShowCellNoteDialog(true);
  }, [cellNotes]);

  const handleSaveCellNote = useCallback(() => {
    if (selectedCell) {
      if (cellNoteInput.trim()) {
        setCellNotes(prev => ({ ...prev, [selectedCell]: cellNoteInput }));
      } else {
        setCellNotes(prev => { const n = {...prev}; delete n[selectedCell]; return n; });
      }
    }
    setShowCellNoteDialog(false);
    setCellNoteInput('');
  }, [selectedCell, cellNoteInput]);

  // Double-click on calendar cell → open day manager or new event form
  const handleCellDoubleClick = useCallback((date) => {
    if (clickTimerRef.current) { clearTimeout(clickTimerRef.current); clickTimerRef.current = null; }
    const dayHolidays = allHolidays[date] || [];
    const dayEvents = events.filter(e => e.dates?.includes(date));
    const dayNote = cellNotes[date];
    const dayBlock = blockedDays[date];
    const hasContent = dayHolidays.length > 0 || dayEvents.length > 0 || dayNote || dayBlock;

    if (hasContent) {
      setDayDialogDate(date);
      setCellNoteInput(cellNotes[date] || '');
      setShowDayDialog(true);
    } else {
      const start = rangeStartRef.current;
      if (start && start !== date) {
        const d1 = new Date(start), d2 = new Date(date);
        const lo = d1 < d2 ? d1 : d2, hi = d1 < d2 ? d2 : d1;
        const dates = [];
        for (let d = new Date(lo); d <= hi; d.setDate(d.getDate() + 1)) {
          dates.push(d.toISOString().split('T')[0]);
        }
        setFormInitialDates(dates);
      } else {
        setFormInitialDates([date]);
      }
      rangeStartRef.current = null;
      setEditingEvent(null);
      setShowEventForm(true);
      setSelectedCell(null);
    }
  }, [allHolidays, events, cellNotes, blockedDays]);

  // Handle drag and drop
  const handleDragStart = useCallback((e, eventId) => {
    setDraggedEvent({ eventId, sourceDate: null });
    e.dataTransfer.effectAllowed = 'copy';
    e.dataTransfer.setData('text/plain', eventId);
  }, []);

  const handleDragOver = useCallback((e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'copy';
  }, []);

  const handleDrop = useCallback((e, targetDate) => {
    e.preventDefault();
    if (!draggedEvent) return;

    const eventId = draggedEvent.eventId;
    const conflicts = getConflicts(targetDate);

    if (conflicts.length > 0) {
      const proceed = confirm(`התראה! תאריך ${targetDate} חופף ל:\n${conflicts.map(c => c.text).join('\n')}\n\nלהמשיך?`);
      if (!proceed) {
        setDraggedEvent(null);
        return;
      }
    }

    setEvents(prev => prev.map(evt =>
      evt.id === eventId
        ? { ...evt, dates: [...new Set([...evt.dates, targetDate])] }
        : evt
    ));
    pendingSync.current = true;
    setDraggedEvent(null);
  }, [draggedEvent, getConflicts]);

  // ============================================================
  // RENDER
  // ============================================================
  return (
    <div className="flex h-screen overflow-hidden">
      {/* SIDEBAR */}
      <div className="sidebar w-80 bg-white border-l border-gray-200 flex flex-col overflow-hidden flex-shrink-0">
        {/* Header */}
        <div className="p-3 bg-gradient-to-l from-blue-600 to-purple-600 text-white">
          <h1 className="text-lg font-bold">מערכת שיבוצים - מישרים</h1>
          <div className="flex items-center gap-2 mt-2">
            <select value={hebrewYear} onChange={e => setHebrewYear(Number(e.target.value))}
              className="bg-white/20 text-white rounded px-2 py-1 text-sm border border-white/30">
              {Object.entries(HEBREW_YEAR_NAMES).map(([y, name]) => (
                <option key={y} value={y} className="text-black">{name} ({y-3761}-{y-3760})</option>
              ))}
            </select>
          </div>
        </div>

        {/* Tab buttons */}
        <div className="flex border-b text-xs">
          {[['events','אירועים'],['hotel','מלונות'],['ai','AI עוזר'],['settings','הגדרות']].map(([key, label]) => (
            <button key={key} onClick={() => setActivePanel(key)}
              className={`flex-1 py-2 px-1 font-medium transition ${activePanel === key ? 'text-blue-600 border-b-2 border-blue-600 bg-blue-50' : 'text-gray-500 hover:text-gray-700'}`}>
              {label}
            </button>
          ))}
        </div>

        {/* Panel content */}
        <div className="flex-1 overflow-y-auto p-3">
          {activePanel === 'events' && (
            <EventsPanel
              events={events}
              selectedEvent={selectedEvent}
              setSelectedEvent={setSelectedEvent}
              setShowEventForm={setShowEventForm}
              setEditingEvent={setEditingEvent}
              removeEvent={removeEvent}
              cancelDate={cancelDate}
              postponeDate={postponeDate}
              cancelledDates={cancelledDates}
              postponedDates={postponedDates}
              suggestDates={suggestDates}
              addEvent={addEvent}
              getConflicts={getConflicts}
              onHoverEvent={setHoveredEventId}
              handleDragStart={handleDragStart}
            />
          )}
          {activePanel === 'hotel' && (
            <HotelPanel events={events} setEvents={setEvents} onChanged={() => { pendingSync.current = true; }} />
          )}
          {activePanel === 'ai' && (
            <AiPanel
              apiKey={apiKey}
              chatHistory={chatHistory}
              chatInput={chatInput}
              setChatInput={setChatInput}
              sendAiMessage={sendAiMessage}
              isAiLoading={isAiLoading}
              chatEndRef={chatEndRef}
            />
          )}
          {activePanel === 'settings' && (
            <SettingsPanel
              apiKey={apiKey}
              setApiKey={(k) => { setApiKey(k); localStorage.setItem('misharim_api_key', k); }}
              ghToken={ghToken}
              setGhToken={(t) => { setGhToken(t); localStorage.setItem('misharim_gh_token', t); }}
              syncStatus={syncStatus}
              lastSync={lastSync}
              saveProject={saveProject}
              loadProject={loadProject}
              refreshFromGithub={refreshFromGithub}
              exportToExcel={exportToExcel}
              exportForRashel={exportForRashel}
              blockedDays={blockedDays}
              unblockDay={unblockDay}
              customHolidays={customHolidays}
              removeCustomHoliday={removeCustomHoliday}
              hiddenHolidays={hiddenHolidays}
              setHiddenHolidays={setHiddenHolidays}
            />
          )}
        </div>
      </div>

      {/* MAIN GANTT AREA */}
      <div className="flex-1 overflow-auto bg-gray-50 p-4">
        <div className="mb-3 flex items-center justify-between flex-wrap gap-2">
          <div className="flex items-center gap-2 text-xs">
            <span className="inline-block w-4 h-4 rounded" style={{background:'#99CCFF'}}></span><span>שישי</span>
            <span className="inline-block w-4 h-4 rounded" style={{background:'#E3C9B7'}}></span><span>שבת</span>
            <span className="inline-block w-4 h-4 rounded" style={{background:'#D8D6C2'}}></span><span>חג יהודי</span>
            <span className="inline-block w-4 h-4 rounded" style={{background:'#FFCCCC'}}></span><span>חג ערבי</span>
            <span className="inline-block w-4 h-4 rounded" style={{background:'#CCE5CC'}}></span><span>חג דרוזי</span>
            <span className="inline-block w-4 h-4 rounded border border-red-300" style={{background:'repeating-linear-gradient(45deg, transparent, transparent 2px, #ff000015 2px, #ff000015 4px)'}}></span><span>חסום</span>
          </div>
          <div className="flex items-center gap-2">
            <span className="text-xs text-gray-400">דבל קליק = אירוע חדש | Shift+לחיצה = חסום | Ctrl+לחיצה = חג ידני</span>
            <select value={viewMode} onChange={e => setViewMode(e.target.value === 'year' ? 'year' : Number(e.target.value))}
              className="border rounded px-2 py-1 text-xs bg-white">
              <option value="year">תצוגה שנתית</option>
              {yearData.map((m, i) => (
                <option key={i} value={i}>{m.name} {m.year}</option>
              ))}
            </select>
          </div>
        </div>

        {(viewMode === 'year' ? yearData : [yearData[viewMode]]).filter(Boolean).map((month, idx) => (
          <MonthBlock
            key={`${month.year}-${month.month}`}
            month={month}
            monthIndex={viewMode === 'year' ? yearData.indexOf(month) : viewMode}
            holidays={allHolidays}
            blockedDays={blockedDays}
            getEventsForDate={getEventsForDate}
            handleCellClick={handleCellClick}
            selectedCell={selectedCell}
            cancelledDates={cancelledDates}
            postponedDates={postponedDates}
            events={events}
            setTooltip={setTooltip}
            hoveredEventId={hoveredEventId}
            isMonthlyView={viewMode !== 'year'}
            cellNotes={cellNotes}
            handleOpenCellNoteDialog={handleOpenCellNoteDialog}
            handleCellDoubleClick={handleCellDoubleClick}
            handleDragOver={handleDragOver}
            handleDrop={handleDrop}
            draggedEvent={draggedEvent}
          />
        ))}
      </div>

      {/* Event Form Modal */}
      {showEventForm && (
        <EventFormModal
          editingEvent={editingEvent}
          initialDates={formInitialDates}
          onClose={() => { setShowEventForm(false); setEditingEvent(null); setFormInitialDates(null); }}
          onSave={(data) => {
            if (editingEvent) {
              setEvents(prev => prev.map(e => e.id === editingEvent.id ? { ...e, ...data } : e));
              pendingSync.current = true;
            } else {
              addEvent(data);
            }
            setShowEventForm(false);
            setEditingEvent(null);
          }}
          suggestDates={suggestDates}
          suggestRecurringSeries={suggestRecurringSeries}
          parseRecurrenceText={parseRecurrenceText}
          getConflicts={getConflicts}
        />
      )}

      {/* Day Manager Dialog */}
      {showDayDialog && dayDialogDate && (() => {
        const dHols = allHolidays[dayDialogDate] || [];
        const dRawHols = holidays[dayDialogDate] || [];
        const dCustomHols = customHolidays[dayDialogDate] ? [{ name: customHolidays[dayDialogDate].name, type: customHolidays[dayDialogDate].type || 'custom' }] : [];
        const dAllHols = [...dRawHols.filter(h => !hiddenHolidays[`${dayDialogDate}_${h.name}`]), ...dCustomHols.filter(h => !hiddenHolidays[`${dayDialogDate}_${h.name}`])];
        const dHiddenHols = [...(holidays[dayDialogDate] || []).filter(h => hiddenHolidays[`${dayDialogDate}_${h.name}`])];
        const dEvents = events.filter(e => e.dates?.includes(dayDialogDate));
        const dNote = cellNotes[dayDialogDate];
        const dBlock = blockedDays[dayDialogDate];
        return (
        <div className="fixed inset-0 bg-black/50 z-100 flex items-center justify-center" onClick={() => { setShowDayDialog(false); setEditingHoliday(null); }}>
          <div className="bg-white rounded-xl max-w-lg w-[95%] max-h-[85vh] overflow-y-auto shadow-xl" dir="rtl" onClick={e => e.stopPropagation()}>
            <div className="p-5">
              <h2 className="text-lg font-bold mb-1">ניהול יום — {fmtDate(dayDialogDate)}</h2>
              <p className="text-gray-400 text-xs mb-4">{parseDate(dayDialogDate).toLocaleDateString('he-IL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</p>

              {/* Holidays section */}
              {(dAllHols.length > 0 || dHiddenHols.length > 0) && (
                <div className="mb-4">
                  <h3 className="font-semibold text-sm mb-2 text-amber-700">חגים וימים מיוחדים</h3>
                  <div className="space-y-2">
                    {dAllHols.map((h, i) => {
                      const holKey = `${dayDialogDate}_${h.name}`;
                      const isEditing = editingHoliday?.origDate === dayDialogDate && editingHoliday?.origName === h.name;
                      if (isEditing) return (
                        <div key={i} className="text-sm bg-amber-50 rounded-lg px-3 py-3 space-y-2 border border-amber-200">
                          <div className="flex gap-2 items-center">
                            <label className="text-xs text-gray-500 w-10">שם:</label>
                            <input value={editingHoliday.newName} onChange={e => setEditingHoliday(prev => ({ ...prev, newName: e.target.value }))}
                              className="flex-1 border rounded px-2 py-1 text-sm" />
                          </div>
                          <div className="flex gap-2 items-center">
                            <label className="text-xs text-gray-500 w-10">תאריך:</label>
                            <input type="date" value={editingHoliday.newDate} onChange={e => setEditingHoliday(prev => ({ ...prev, newDate: e.target.value }))}
                              className="flex-1 border rounded px-2 py-1 text-sm" />
                          </div>
                          <div className="flex gap-2 justify-end">
                            <button onClick={() => {
                              const eh = editingHoliday;
                              setHiddenHolidays(prev => ({ ...prev, [`${eh.origDate}_${eh.origName}`]: true }));
                              if (customHolidays[eh.origDate]?.name === eh.origName) {
                                setCustomHolidays(prev => { const n = { ...prev }; delete n[eh.origDate]; return n; });
                              }
                              setCustomHolidays(prev => ({ ...prev, [eh.newDate]: { name: eh.newName, type: eh.origType || 'custom' } }));
                              pendingSync.current = true;
                              setEditingHoliday(null);
                              if (eh.newDate !== dayDialogDate) setShowDayDialog(false);
                            }} className="text-xs bg-blue-500 text-white rounded px-3 py-1 hover:bg-blue-600">שמור</button>
                            <button onClick={() => setEditingHoliday(null)} className="text-xs bg-gray-200 text-gray-600 rounded px-3 py-1 hover:bg-gray-300">בטל</button>
                          </div>
                        </div>
                      );
                      return (
                      <div key={i} className="flex justify-between items-center text-sm bg-amber-50 rounded-lg px-3 py-2">
                        <span>{h.name} <span className="text-xs text-gray-400">({h.type === 'jewish' ? 'יהודי' : h.type === 'arab' ? 'ערבי' : h.type === 'druze' ? 'דרוזי' : h.type === 'memorial' ? 'זיכרון' : h.type === 'islamic' ? 'מוסלמי' : 'ידני'})</span></span>
                        <div className="flex gap-1">
                          <button onClick={() => setEditingHoliday({ origDate: dayDialogDate, origName: h.name, origType: h.type, newName: h.name, newDate: dayDialogDate })}
                            className="text-blue-400 hover:text-blue-600 text-xs px-2 py-0.5 rounded hover:bg-blue-50">עריכה</button>
                          <button onClick={() => {
                            setHiddenHolidays(prev => ({ ...prev, [holKey]: true }));
                            pendingSync.current = true;
                          }} className="text-red-400 hover:text-red-600 text-xs px-2 py-0.5 rounded hover:bg-red-50">הסתר</button>
                        </div>
                      </div>
                      );
                    })}
                    {dHiddenHols.map((h, i) => (
                      <div key={`hid-${i}`} className="flex justify-between items-center text-sm bg-gray-50 rounded-lg px-3 py-2 opacity-60">
                        <span className="line-through">{h.name}</span>
                        <button onClick={() => {
                          setHiddenHolidays(prev => { const n = { ...prev }; delete n[`${dayDialogDate}_${h.name}`]; return n; });
                          pendingSync.current = true;
                        }} className="text-green-500 hover:text-green-700 text-xs px-2 py-0.5 rounded hover:bg-green-50">החזר</button>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Events section */}
              {dEvents.length > 0 && (
                <div className="mb-4">
                  <h3 className="font-semibold text-sm mb-2 text-blue-700">אירועים</h3>
                  <div className="space-y-1">
                    {dEvents.map(evt => (
                      <div key={evt.id} className="flex justify-between items-center text-sm bg-blue-50 rounded-lg px-3 py-2">
                        <span>{evt.name}</span>
                        <div className="flex gap-1">
                          <button onClick={() => {
                            setShowDayDialog(false);
                            setEditingEvent(evt);
                            setShowEventForm(true);
                          }} className="text-blue-500 hover:text-blue-700 text-xs px-2 py-0.5 rounded hover:bg-blue-100">עריכה</button>
                          <button onClick={() => {
                            setEvents(prev => prev.map(e =>
                              e.id === evt.id ? { ...e, dates: e.dates.filter(d => d !== dayDialogDate) } : e
                            ));
                            pendingSync.current = true;
                          }} className="text-red-400 hover:text-red-600 text-xs px-2 py-0.5 rounded hover:bg-red-50">הסר מתאריך</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {/* Block section */}
              {dBlock && (
                <div className="mb-4">
                  <h3 className="font-semibold text-sm mb-2 text-red-700">חסימה</h3>
                  <div className="flex justify-between items-center text-sm bg-red-50 rounded-lg px-3 py-2">
                    <span>{dBlock}</span>
                    <button onClick={() => { unblockDay(dayDialogDate); }} className="text-red-500 hover:text-red-700 text-xs px-2 py-0.5 rounded hover:bg-red-100">הסר חסימה</button>
                  </div>
                </div>
              )}

              {/* Note section */}
              <div className="mb-4">
                <h3 className="font-semibold text-sm mb-2 text-gray-700">הערה</h3>
                <textarea value={cellNoteInput} onChange={e => setCellNoteInput(e.target.value)}
                  placeholder="הזן הערה או מידע..."
                  className="w-full h-20 p-3 border border-gray-200 rounded-lg resize-none text-sm focus:outline-none focus:ring-2 focus:ring-blue-400" />
                <div className="flex gap-2 mt-1">
                  <button onClick={() => {
                    if (cellNoteInput.trim()) {
                      setCellNotes(prev => ({ ...prev, [dayDialogDate]: cellNoteInput }));
                    } else {
                      setCellNotes(prev => { const n = { ...prev }; delete n[dayDialogDate]; return n; });
                    }
                    pendingSync.current = true;
                  }} className="text-xs bg-blue-100 text-blue-700 rounded px-3 py-1 hover:bg-blue-200">שמור הערה</button>
                  {dNote && <button onClick={() => {
                    setCellNotes(prev => { const n = { ...prev }; delete n[dayDialogDate]; return n; });
                    setCellNoteInput('');
                    pendingSync.current = true;
                  }} className="text-xs bg-red-50 text-red-500 rounded px-3 py-1 hover:bg-red-100">מחק הערה</button>}
                </div>
              </div>

              {/* Actions */}
              <div className="flex gap-2 pt-3 border-t">
                <button onClick={() => {
                  setShowDayDialog(false);
                  setFormInitialDates([dayDialogDate]);
                  setEditingEvent(null);
                  setShowEventForm(true);
                }} className="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700 transition">+ אירוע חדש</button>
                <button onClick={() => setShowDayDialog(false)} className="flex-1 bg-gray-100 text-gray-600 rounded-lg py-2 text-sm font-medium hover:bg-gray-200 transition">סגור</button>
              </div>
            </div>
          </div>
        </div>
        );
      })()}

      {/* Cell Note Dialog */}
      {showCellNoteDialog && selectedCell && (
        <div className="fixed inset-0 bg-black/50 z-100 flex items-center justify-center" onClick={() => setShowCellNoteDialog(false)}>
          <div className="bg-white rounded-lg max-w-md w-90% max-h-80vh overflow-y-auto shadow-lg" onClick={e => e.stopPropagation()}>
            <div className="p-4">
              <h2 className="text-lg font-bold mb-2">הערה לתאריך {fmtDate(selectedCell)}</h2>
              <p className="text-gray-500 text-sm mb-3">{parseDate(selectedCell).toLocaleDateString('he-IL')}</p>
              <textarea
                value={cellNoteInput}
                onChange={e => setCellNoteInput(e.target.value)}
                placeholder="הזן הערה או מידע..."
                className="w-full h-32 p-3 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500"
              />
              <div className="flex gap-2 mt-4">
                <button onClick={handleSaveCellNote}
                  className="flex-1 bg-blue-600 text-white rounded-lg py-2 font-medium hover:bg-blue-700 transition">
                  שמור
                </button>
                <button onClick={() => setShowCellNoteDialog(false)}
                  className="flex-1 bg-gray-200 text-gray-700 rounded-lg py-2 font-medium hover:bg-gray-300 transition">
                  בטל
                </button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Tooltip */}
      {tooltip && (
        <div className="tooltip" style={{ left: tooltip.x, top: tooltip.y }}>
          {tooltip.text}
        </div>
      )}
    </div>
  );
}

// ============================================================
// MONTH BLOCK COMPONENT
// ============================================================
function MonthBlock({ month, monthIndex, holidays, blockedDays, getEventsForDate, handleCellClick, selectedCell, cancelledDates, postponedDates, events, setTooltip, hoveredEventId, isMonthlyView, cellNotes, handleOpenCellNoteDialog, handleCellDoubleClick, handleDragOver, handleDrop, draggedEvent }) {
  const maxEventsInMonth = useMemo(() => {
    let max = 0;
    for (const day of month.days) {
      const evts = getEventsForDate(day.date);
      if (evts.length > max) max = evts.length;
    }
    return Math.max(max, 2);
  }, [month, getEventsForDate]);

  // Compute highlighted dates for hovered event
  const highlightDates = useMemo(() => {
    if (!hoveredEventId) return new Set();
    const evt = events.find(e => e.id === hoveredEventId);
    if (!evt) return new Set();
    return new Set(evt.dates);
  }, [hoveredEventId, events]);

  return (
    <div className={`mb-4 ${isMonthlyView ? 'monthly' : ''}`}>
      <div className="flex">
        {/* Month label */}
        <div className="month-label flex items-center justify-center rounded-r-lg" style={{ minHeight: `${(4 + maxEventsInMonth) * (isMonthlyView ? 34 : 28)}px` }}>
          {month.name} {month.year}
        </div>

        {/* Days grid */}
        <div className="flex-1 overflow-x-auto">
          <div className="inline-flex flex-col">
            {/* Row 1: Weekdays */}
            <div className="flex">
              {month.days.map(day => (
                <div key={`dow-${day.date}`} className="gantt-cell gantt-header bg-gray-100 font-semibold text-gray-500" style={{fontSize:'9px'}}>
                  {day.weekdayHeb}
                </div>
              ))}
            </div>

            {/* Row 2: Gregorian dates */}
            <div className="flex">
              {month.days.map(day => (
                <div key={`greg-${day.date}`}
                  className={`gantt-cell text-xs font-medium ${day.isFriday ? 'friday' : ''} ${day.isShabbat ? 'shabbat' : ''} ${blockedDays[day.date] ? 'blocked' : ''} ${highlightDates.has(day.date) ? 'highlight-event' : ''} ${cellNotes[day.date] ? 'has-note' : ''} ${draggedEvent ? 'cursor-copy' : ''}`}
                  onClick={(e) => handleCellClick(day.date, e)}
                  onDoubleClick={(e) => { e.stopPropagation(); handleCellDoubleClick(day.date); }}
                  onDragOver={handleDragOver}
                  onDrop={(e) => handleDrop(e, day.date)}
                  onMouseEnter={(e) => {
                    const info = [];
                    if (holidays[day.date]) info.push(...holidays[day.date].map(h => h.name));
                    if (blockedDays[day.date]) info.push(`🚫 ${blockedDays[day.date]}`);
                    if (cellNotes[day.date]) info.push(`📝 ${cellNotes[day.date]}`);
                    const evts = getEventsForDate(day.date);
                    if (evts.length) info.push(...evts.map(ev => `📌 ${ev.name}`));
                    if (info.length) setTooltip({ x: e.clientX + 10, y: e.clientY + 10, text: info.join(' | ') });
                  }}
                  onMouseLeave={() => setTooltip(null)}
                >
                  {day.day}
                </div>
              ))}
            </div>

            {/* Row 3: Hebrew dates */}
            <div className="flex">
              {month.days.map(day => (
                <div key={`heb-${day.date}`}
                  className={`gantt-cell text-gray-600 ${day.isFriday ? 'friday' : ''} ${day.isShabbat ? 'shabbat' : ''}`}
                  style={{fontSize:'8px'}}>
                  {day.gematria}
                </div>
              ))}
            </div>

            {/* Row 4: Holidays */}
            <div className="flex">
              {month.days.map(day => {
                const hols = holidays[day.date];
                const holType = hols?.[0]?.type;
                let bgClass = '';
                if (holType === 'jewish' || holType === 'memorial') bgClass = 'jewish-holiday';
                else if (holType === 'arab') bgClass = 'arab-holiday';
                else if (holType === 'druze') bgClass = 'druze-holiday';

                return (
                  <div key={`hol-${day.date}`}
                    className={`gantt-cell ${bgClass} ${day.isFriday && !hols ? 'friday' : ''} ${day.isShabbat && !hols ? 'shabbat' : ''} ${hols ? 'cursor-pointer' : ''}`}
                    title={hols?.map(h => h.name).join(', ')}
                    onDoubleClick={hols ? (e) => { e.stopPropagation(); handleCellDoubleClick(day.date); } : undefined}>
                    <span className="holiday-text">{hols?.[0]?.name || ''}</span>
                  </div>
                );
              })}
            </div>

            {/* Event rows */}
            {Array.from({ length: maxEventsInMonth }, (_, rowIdx) => (
              <div key={`evt-row-${rowIdx}`} className="flex">
                {month.days.map(day => {
                  const dayEvents = getEventsForDate(day.date);
                  const evt = dayEvents[rowIdx];
                  if (!evt) {
                    return (
                      <div key={`evt-${day.date}-${rowIdx}`}
                        className={`gantt-cell ${day.isFriday ? 'friday' : ''} ${day.isShabbat ? 'shabbat' : ''} ${blockedDays[day.date] ? 'blocked' : ''} ${selectedCell === day.date ? 'ring-2 ring-blue-500' : ''}`}
                        onClick={(e) => handleCellClick(day.date, e)}
                        onDoubleClick={(e) => { e.stopPropagation(); handleCellDoubleClick(day.date); }}>
                      </div>
                    );
                  }

                  const cat = CATEGORIES[evt.category];
                  const isCancelled = cancelledDates[evt.id]?.[day.date];
                  const isPostponed = postponedDates[evt.id]?.[day.date];

                  return (
                    <div key={`evt-${day.date}-${rowIdx}`}
                      className={`gantt-cell has-event ${isCancelled ? 'event-cancelled' : ''} ${isPostponed ? 'event-postponed' : ''}`}
                      style={{ background: cat?.color + '60' }}
                      title={`${evt.name}${isCancelled ? ' (בוטל)' : ''}${isPostponed ? ' (נדחה)' : ''}`}
                      onClick={(e) => handleCellClick(day.date, e)}
                      onDoubleClick={(e) => { e.stopPropagation(); handleCellDoubleClick(day.date); }}>
                      <span className="event-cell" style={{ color: '#333' }}>
                        {evt.name.slice(0, 6)}
                      </span>
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// EVENTS PANEL
// ============================================================
function EventsPanel({ events, selectedEvent, setSelectedEvent, setShowEventForm, setEditingEvent, removeEvent, cancelDate, postponeDate, cancelledDates, postponedDates, suggestDates, addEvent, getConflicts, onHoverEvent, handleDragStart }) {
  const [showTemplates, setShowTemplates] = useState(false);

  return (
    <div>
      <div className="flex gap-2 mb-3">
        <button onClick={() => { setEditingEvent(null); setShowEventForm(true); }}
          className="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700 transition">
          + אירוע חדש
        </button>
        <button onClick={() => setShowTemplates(!showTemplates)}
          className="bg-gray-100 rounded-lg py-2 px-3 text-sm hover:bg-gray-200 transition" title="תבניות מוכנות">
          📋
        </button>
      </div>

      {showTemplates && (
        <div className="mb-3 bg-yellow-50 rounded-lg p-2 border border-yellow-200">
          <p className="text-xs font-semibold mb-2 text-yellow-800">תבניות מוכנות מראש:</p>
          {EVENT_TEMPLATES.map((tmpl, i) => (
            <button key={i}
              onClick={() => {
                addEvent({
                  name: tmpl.name,
                  category: tmpl.category,
                  type: tmpl.type,
                  dates: [],
                  participants: tmpl.participants,
                  notes: tmpl.notes,
                  hotel: {}
                });
                setShowTemplates(false);
              }}
              className="block w-full text-right text-xs py-1 px-2 hover:bg-yellow-100 rounded transition">
              {CATEGORIES[tmpl.category]?.icon} {tmpl.name}
              <span className="text-gray-400 mr-1">({tmpl.notes})</span>
            </button>
          ))}
        </div>
      )}

      {selectedEvent && (
        <div className="mb-3 p-2 bg-blue-50 rounded-lg border border-blue-200 text-xs">
          <p className="font-semibold text-blue-800">📌 מצב שיבוץ: {selectedEvent.name}</p>
          <p className="text-blue-600">לחץ על תא בגאנט לשיבוץ</p>
          <button onClick={() => setSelectedEvent(null)} className="text-red-500 hover:text-red-700 mt-1">ביטול בחירה ✕</button>
        </div>
      )}

      <div className="space-y-2">
        {events.length === 0 && <p className="text-gray-400 text-sm text-center py-4">אין אירועים עדיין</p>}
        {events.map(evt => (
          <EventCard
            key={evt.id}
            event={evt}
            isSelected={selectedEvent?.id === evt.id}
            onSelect={() => setSelectedEvent(selectedEvent?.id === evt.id ? null : evt)}
            onEdit={() => { setEditingEvent(evt); setShowEventForm(true); }}
            onRemove={() => { if(confirm(`למחוק את "${evt.name}"?`)) removeEvent(evt.id); }}
            onCancelDate={(date) => { if(confirm(`לבטל את ${fmtDate(date)}?`)) cancelDate(evt.id, date); }}
            onPostponeDate={(date) => {
              const input = prompt(`תאריך חדש עבור ${fmtDate(date)} (DD/MM/YYYY):`);
              if (input) {
                // Parse DD/MM/YYYY or YYYY-MM-DD
                let newDate = input;
                const ddmmyyyy = input.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})$/);
                if (ddmmyyyy) {
                  newDate = `${ddmmyyyy[3]}-${ddmmyyyy[2].padStart(2,'0')}-${ddmmyyyy[1].padStart(2,'0')}`;
                }
                const conflicts = getConflicts(newDate);
                if (conflicts.length > 0) {
                  const ok = confirm(`התראה! ${fmtDate(newDate)} חופף ל:\n${conflicts.map(c=>c.text).join('\n')}\nלהמשיך?`);
                  if (!ok) return;
                }
                postponeDate(evt.id, date, newDate);
              }
            }}
            cancelledDates={cancelledDates[evt.id] || {}}
            postponedDates={postponedDates[evt.id] || {}}
            onHover={onHoverEvent}
            onDragStart={handleDragStart}
          />
        ))}
      </div>
    </div>
  );
}

// ============================================================
// EVENT CARD
// ============================================================
function EventCard({ event, isSelected, onSelect, onEdit, onRemove, onCancelDate, onPostponeDate, cancelledDates, postponedDates, onHover, onDragStart }) {
  const [expanded, setExpanded] = useState(false);
  const [showTip, setShowTip] = useState(false);
  const cat = CATEGORIES[event.category];

  return (
    <div
      draggable
      onDragStart={(e) => onDragStart?.(e, event.id)}
      className={`rounded-lg border p-2 text-xs transition relative cursor-grab active:cursor-grabbing ${isSelected ? 'border-blue-500 bg-blue-50 shadow' : 'border-gray-200 bg-white hover:shadow-sm'}`}
      onMouseEnter={() => { onHover?.(event.id); setShowTip(true); }}
      onMouseLeave={() => { onHover?.(null); setShowTip(false); }}
    >
      {showTip && !expanded && event.dates.length > 0 && (
        <div className="absolute z-50 bg-gray-900 text-white rounded-lg px-3 py-2 text-xs shadow-lg" style={{ top: '100%', right: 0, marginTop: 4, whiteSpace: 'nowrap' }}>
          <p className="font-semibold mb-1">{event.name}</p>
          {event.dates.map(d => (
            <p key={d} className="text-gray-300">{fmtDate(d)}{cancelledDates[d] ? ' ❌' : ''}{postponedDates[d] ? ` → ${fmtDate(postponedDates[d])}` : ''}</p>
          ))}
        </div>
      )}
      <div className="flex items-center justify-between">
        <button
          onClick={() => setExpanded(!expanded)}
          className="flex items-center gap-1 flex-1 min-w-0 text-right hover:opacity-70 transition cursor-pointer"
        >
          <span className="w-3 h-3 rounded-full flex-shrink-0" style={{ background: cat?.color }}></span>
          <span className="font-medium truncate">{event.name}</span>
          <span className="text-gray-400">({event.dates.length})</span>
        </button>
        <div className="flex gap-1 flex-shrink-0">
          <button onClick={onSelect} className="p-1 hover:bg-blue-100 rounded" title="שיבוץ">📌</button>
          <button onClick={onEdit} className="p-1 hover:bg-gray-100 rounded" title="עריכה">✏️</button>
          <button onClick={onRemove} className="p-1 hover:bg-red-100 rounded text-red-500" title="מחיקה">🗑️</button>
        </div>
      </div>

      {expanded && (
        <div className="mt-2 pt-2 border-t border-gray-100">
          {event.notes && <p className="text-gray-500 mb-1">{event.notes}</p>}
          {event.participants > 0 && <p className="text-gray-500">👤 {event.participants} משתתפים</p>}
          <p className="font-medium mt-1 mb-1">תאריכים:</p>
          {event.dates.length === 0 && <p className="text-gray-400">לא שובצו תאריכים</p>}
          {event.dates.map(d => {
            const isCancelled = cancelledDates[d];
            const postponedTo = postponedDates[d];
            return (
              <div key={d} className={`flex items-center justify-between py-0.5 ${isCancelled ? 'line-through text-gray-400' : ''}`}>
                <span>
                  {fmtDate(d)} {isCancelled && '❌'} {postponedTo && `→ ${fmtDate(postponedTo)}`}
                </span>
                <div className="flex gap-1">
                  {!isCancelled && !postponedTo && (
                    <>
                      <button onClick={() => onPostponeDate(d)} className="text-yellow-600 hover:text-yellow-800" title="דחייה">⏩</button>
                      <button onClick={() => onCancelDate(d)} className="text-red-400 hover:text-red-600" title="ביטול">❌</button>
                    </>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ============================================================
// HELPER: parse any date input (DD/MM/YYYY or YYYY-MM-DD) → YYYY-MM-DD
// ============================================================
function parseDateInput(input) {
  const s = input.trim();
  const ddmmyyyy = s.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})$/);
  if (ddmmyyyy) return `${ddmmyyyy[3]}-${ddmmyyyy[2].padStart(2,'0')}-${ddmmyyyy[1].padStart(2,'0')}`;
  const iso = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (iso) return `${iso[1]}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;
  return null;
}

// ============================================================
// EVENT FORM MODAL (Enhanced with recurring support)
// ============================================================
function EventFormModal({ editingEvent, initialDates, onClose, onSave, suggestDates, suggestRecurringSeries, parseRecurrenceText, getConflicts }) {
  const [name, setName] = useState(editingEvent?.name || '');
  const [category, setCategory] = useState(editingEvent?.category || 'other');
  const [type, setType] = useState(editingEvent?.type || 'one-time');
  const [participants, setParticipants] = useState(editingEvent?.participants || 0);
  const [notes, setNotes] = useState(editingEvent?.notes || '');

  // Selected dates (YYYY-MM-DD strings)
  const [selectedDates, setSelectedDates] = useState(editingEvent?.dates || initialDates || []);

  // Recurring config
  const [meetingCount, setMeetingCount] = useState(editingEvent?.dates?.length || 3);
  const [frequency, setFrequency] = useState('monthly');
  const [preferredDay, setPreferredDay] = useState('');
  const [startMonthIdx, setStartMonthIdx] = useState(0);
  const [endMonthIdx, setEndMonthIdx] = useState(11);
  const [freeText, setFreeText] = useState('');

  // Suggestions
  const [suggestions, setSuggestions] = useState([]);
  const [showAlternatives, setShowAlternatives] = useState({}); // {index: true}

  // Manual date entry
  const [manualDate, setManualDate] = useState('');
  const [calendarDate, setCalendarDate] = useState('');
  const calendarInputRef = useRef(null);

  const isRecurring = type === 'recurring' || type === 'sequence';

  // Generate suggestions for recurring events
  const handleSuggestRecurring = () => {
    let params = { count: meetingCount, freq: frequency, day: preferredDay !== '' ? Number(preferredDay) : undefined, start: startMonthIdx, end: endMonthIdx };

    // If free text is provided, parse it and override
    if (freeText.trim()) {
      const parsed = parseRecurrenceText(freeText);
      if (parsed.count) params.count = parsed.count;
      if (parsed.frequency) params.freq = parsed.frequency;
      if (parsed.preferredDay !== null && parsed.preferredDay !== undefined) params.day = parsed.preferredDay;
      if (parsed.startMonthIdx !== null && parsed.startMonthIdx !== undefined) params.start = parsed.startMonthIdx;
      if (parsed.endMonthIdx !== null && parsed.endMonthIdx !== undefined) params.end = parsed.endMonthIdx;
      // Also update the UI fields to reflect parsed values
      if (parsed.count) setMeetingCount(parsed.count);
      if (parsed.frequency) setFrequency(parsed.frequency);
      if (parsed.preferredDay !== null && parsed.preferredDay !== undefined) setPreferredDay(String(parsed.preferredDay));
      if (parsed.startMonthIdx !== null) setStartMonthIdx(parsed.startMonthIdx);
      if (parsed.endMonthIdx !== null) setEndMonthIdx(parsed.endMonthIdx);
    }

    const results = suggestRecurringSeries(params.count, params.freq, {
      preferredDay: params.day,
      startMonthIdx: params.start,
      endMonthIdx: params.end
    });
    setSuggestions(results);
    setShowAlternatives({});
  };

  // Generate simple suggestions for one-time events
  const handleSuggestOneTime = () => {
    const s = suggestDates(5);
    setSuggestions(s.map(x => ({ ...x, conflicts: getConflicts(x.date).map(c => ({ type: c.type, text: c.text })), accepted: true, alternatives: [] })));
  };

  // Toggle acceptance of a suggestion
  const toggleSuggestion = (idx) => {
    setSuggestions(prev => prev.map((s, i) => i === idx ? { ...s, accepted: !s.accepted } : s));
  };

  // Replace a suggestion with an alternative
  const replaceSuggestion = (idx, altDate) => {
    setSuggestions(prev => prev.map((s, i) => {
      if (i !== idx) return s;
      const conflicts = getConflicts(altDate);
      return { ...s, date: altDate, conflicts: conflicts.map(c => ({ type: c.type, text: c.text })), accepted: true };
    }));
    setShowAlternatives(prev => ({ ...prev, [idx]: false }));
  };

  // Apply accepted suggestions to selected dates
  const applyAcceptedSuggestions = () => {
    const accepted = suggestions.filter(s => s.accepted).map(s => s.date);
    setSelectedDates(prev => [...new Set([...prev, ...accepted])].sort());
  };

  // Add manual date
  const addManualDate = () => {
    const parsed = parseDateInput(manualDate);
    if (parsed && !selectedDates.includes(parsed)) {
      setSelectedDates(prev => [...prev, parsed].sort());
      setManualDate('');
    }
  };

  // Add calendar date
  const addCalendarDate = () => {
    if (calendarDate && !selectedDates.includes(calendarDate)) {
      setSelectedDates(prev => [...prev, calendarDate].sort());
      setCalendarDate('');
    }
  };

  // Remove a selected date
  const removeSelectedDate = (date) => {
    setSelectedDates(prev => prev.filter(d => d !== date));
  };

  // Count conflicts in suggestions
  const conflictCount = suggestions.filter(s => s.accepted && s.conflicts && s.conflicts.length > 0).length;
  const acceptedCount = suggestions.filter(s => s.accepted).length;

  return (
    <div className="fixed inset-0 bg-black/50 flex items-center justify-center z-50" onClick={onClose}>
      <div className="bg-white rounded-xl shadow-2xl w-[560px] max-h-[85vh] overflow-y-auto p-5" onClick={e => e.stopPropagation()}>
        <h2 className="text-lg font-bold mb-4">{editingEvent ? 'עריכת אירוע' : 'אירוע חדש'}</h2>

        <div className="space-y-3">
          {/* Name */}
          <div>
            <label className="block text-sm font-medium mb-1">שם האירוע</label>
            <input value={name} onChange={e => setName(e.target.value)}
              className="w-full border rounded-lg px-3 py-2 text-sm" placeholder="שם האירוע" />
          </div>

          {/* Category + Type */}
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="block text-sm font-medium mb-1">קטגוריה</label>
              <select value={category} onChange={e => setCategory(e.target.value)}
                className="w-full border rounded-lg px-3 py-2 text-sm">
                {Object.entries(CATEGORIES).map(([k, v]) => (
                  <option key={k} value={k}>{v.icon} {v.name}</option>
                ))}
              </select>
            </div>
            <div>
              <label className="block text-sm font-medium mb-1">סוג</label>
              <select value={type} onChange={e => { setType(e.target.value); setSuggestions([]); }}
                className="w-full border rounded-lg px-3 py-2 text-sm">
                <option value="one-time">חד-פעמי</option>
                <option value="sequence">רצף ימים</option>
                <option value="recurring">חוזר</option>
              </select>
            </div>
          </div>

          {/* Participants */}
          <div>
            <label className="block text-sm font-medium mb-1">משתתפים</label>
            <input type="number" value={participants} onChange={e => setParticipants(Number(e.target.value))}
              className="w-full border rounded-lg px-3 py-2 text-sm" />
          </div>

          {/* ========== RECURRING CONFIG ========== */}
          {isRecurring && (
            <div className="bg-purple-50 rounded-lg p-3 border border-purple-200 space-y-3">
              <p className="text-sm font-semibold text-purple-800">⚙️ הגדרת מפגשים חוזרים</p>

              <div className="grid grid-cols-2 gap-3">
                <div>
                  <label className="block text-xs font-medium mb-1 text-gray-600">מספר מפגשים</label>
                  <input type="number" min={1} max={52} value={meetingCount} onChange={e => setMeetingCount(Number(e.target.value))}
                    className="w-full border rounded-lg px-3 py-2 text-sm" />
                </div>
                <div>
                  <label className="block text-xs font-medium mb-1 text-gray-600">תדירות</label>
                  <select value={frequency} onChange={e => setFrequency(e.target.value)}
                    className="w-full border rounded-lg px-3 py-2 text-sm">
                    <option value="weekly">שבועי</option>
                    <option value="bi-weekly">דו-שבועי</option>
                    <option value="monthly">חודשי</option>
                    <option value="quarterly">רבעוני</option>
                    <option value="custom">מותאם</option>
                  </select>
                </div>
              </div>

              <div className="grid grid-cols-3 gap-3">
                <div>
                  <label className="block text-xs font-medium mb-1 text-gray-600">יום מועדף</label>
                  <select value={preferredDay} onChange={e => setPreferredDay(e.target.value)}
                    className="w-full border rounded-lg px-3 py-2 text-sm">
                    <option value="">ללא העדפה</option>
                    <option value="0">ראשון</option>
                    <option value="1">שני</option>
                    <option value="2">שלישי</option>
                    <option value="3">רביעי</option>
                    <option value="4">חמישי</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium mb-1 text-gray-600">מחודש</label>
                  <select value={startMonthIdx} onChange={e => setStartMonthIdx(Number(e.target.value))}
                    className="w-full border rounded-lg px-3 py-2 text-sm">
                    {MONTHS_HEB.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-medium mb-1 text-gray-600">עד חודש</label>
                  <select value={endMonthIdx} onChange={e => setEndMonthIdx(Number(e.target.value))}
                    className="w-full border rounded-lg px-3 py-2 text-sm">
                    {MONTHS_HEB.map((m, i) => <option key={i} value={i}>{m}</option>)}
                  </select>
                </div>
              </div>

              {/* Free text */}
              <div>
                <label className="block text-xs font-medium mb-1 text-gray-600">או תאר בטקסט חופשי</label>
                <input value={freeText} onChange={e => setFreeText(e.target.value)}
                  className="w-full border rounded-lg px-3 py-2 text-sm bg-white"
                  placeholder='לדוגמה: "6 מפגשים חודשיים בימי שלישי מנובמבר עד אפריל"' />
              </div>

              <button onClick={handleSuggestRecurring}
                className="w-full bg-purple-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-purple-700 transition">
                🪄 הצע תאריכים לכל המפגשים
              </button>
            </div>
          )}

          {/* One-time suggest button */}
          {!isRecurring && (
            <button onClick={handleSuggestOneTime}
              className="text-xs text-blue-600 hover:text-blue-800 font-medium">
              💡 הצע תאריכים פנויים
            </button>
          )}

          {/* ========== SUGGESTIONS RESULTS ========== */}
          {suggestions.length > 0 && (
            <div className="bg-blue-50 rounded-lg p-3 border border-blue-200">
              <div className="flex justify-between items-center mb-2">
                <p className="text-sm font-semibold text-blue-800">📅 הצעות תאריכים</p>
                <span className="text-xs text-gray-500">
                  {acceptedCount} נבחרו
                  {conflictCount > 0 && <span className="text-orange-600 mr-1"> · {conflictCount} התנגשויות</span>}
                </span>
              </div>

              <div className="space-y-1 max-h-48 overflow-y-auto">
                {suggestions.map((s, idx) => (
                  <div key={idx}>
                    <div className={`flex items-center gap-2 py-1.5 px-2 rounded text-xs transition ${s.accepted ? 'bg-white' : 'bg-gray-100 opacity-60'}`}>
                      {/* Toggle */}
                      <button onClick={() => toggleSuggestion(idx)}
                        className={`w-5 h-5 rounded border flex items-center justify-center flex-shrink-0 transition ${s.accepted ? 'bg-green-500 border-green-500 text-white' : 'border-gray-300'}`}>
                        {s.accepted && '✓'}
                      </button>

                      {/* Date info */}
                      <span className="font-medium min-w-[85px]">{fmtDate(s.date)}</span>
                      <span className="text-gray-500 min-w-[25px]">({s.weekdayHeb || s.weekday})</span>
                      <span className="text-gray-400">{s.monthName || s.month}</span>

                      {/* Conflict badges */}
                      <div className="flex gap-1 flex-1 justify-end">
                        {s.conflicts && s.conflicts.map((c, ci) => (
                          <span key={ci} className={`px-1.5 py-0.5 rounded text-[10px] font-medium ${
                            c.type === 'jewish' || c.type === 'memorial' ? 'bg-yellow-100 text-yellow-800' :
                            c.type === 'arab' ? 'bg-red-100 text-red-700' :
                            c.type === 'druze' ? 'bg-green-100 text-green-700' :
                            c.type === 'blocked' ? 'bg-orange-100 text-orange-700' :
                            'bg-blue-100 text-blue-700'
                          }`}>{c.text}</span>
                        ))}
                      </div>

                      {/* Show alternatives button */}
                      {s.alternatives && s.alternatives.length > 0 && s.conflicts && s.conflicts.length > 0 && (
                        <button onClick={() => setShowAlternatives(prev => ({ ...prev, [idx]: !prev[idx] }))}
                          className="text-blue-500 hover:text-blue-700 flex-shrink-0" title="הצג חלופות">
                          🔄
                        </button>
                      )}
                    </div>

                    {/* Alternatives dropdown */}
                    {showAlternatives[idx] && s.alternatives && (
                      <div className="mr-7 mt-1 mb-2 bg-white rounded border border-blue-100 p-1">
                        <p className="text-[10px] text-gray-400 mb-1 px-1">חלופות:</p>
                        {s.alternatives.map((alt, ai) => (
                          <button key={ai} onClick={() => replaceSuggestion(idx, alt.date)}
                            className="block w-full text-right text-xs py-1 px-2 hover:bg-blue-50 rounded">
                            {fmtDate(alt.date)} ({alt.weekdayHeb}) — {alt.monthName}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                ))}
              </div>

              <button onClick={applyAcceptedSuggestions}
                className="w-full mt-2 bg-blue-600 text-white rounded-lg py-1.5 text-xs font-medium hover:bg-blue-700 transition">
                ✅ החל {acceptedCount} תאריכים שנבחרו
              </button>
            </div>
          )}

          {/* ========== SELECTED DATES ========== */}
          <div>
            <label className="block text-sm font-medium mb-1">תאריכים שנבחרו ({selectedDates.length})</label>

            {/* Date chips */}
            {selectedDates.length > 0 ? (
              <div className="flex flex-wrap gap-1 mb-2">
                {selectedDates.map(d => {
                  const pd = parseDate(d);
                  const conf = getConflicts(d);
                  return (
                    <span key={d} className={`inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-medium ${conf.length > 0 ? 'bg-orange-100 text-orange-800' : 'bg-green-100 text-green-800'}`}>
                      {fmtDate(d)} ({hebWeekday(pd)})
                      {conf.length > 0 && <span title={conf.map(c=>c.text).join(', ')}>⚠️</span>}
                      <button onClick={() => removeSelectedDate(d)} className="text-red-400 hover:text-red-600 mr-0.5">✕</button>
                    </span>
                  );
                })}
              </div>
            ) : (
              <p className="text-xs text-gray-400 mb-2">לא נבחרו תאריכים עדיין</p>
            )}

            {/* Manual + Calendar add */}
            <div className="flex gap-2">
              <div className="flex-1 flex gap-1">
                <input value={manualDate} onChange={e => setManualDate(e.target.value)}
                  onKeyDown={e => { if (e.key === 'Enter') addManualDate(); }}
                  className="flex-1 border rounded-lg px-2 py-1.5 text-xs" placeholder="DD/MM/YYYY, DD/MM/YYYY..." />
                <button onClick={() => {
                  // Support multiple dates separated by commas
                  const parts = manualDate.split(',');
                  let added = false;
                  parts.forEach(p => {
                    const parsed = parseDateInput(p);
                    if (parsed && !selectedDates.includes(parsed)) {
                      setSelectedDates(prev => [...prev, parsed].sort());
                      added = true;
                    }
                  });
                  if (added) setManualDate('');
                }} className="bg-gray-200 text-gray-700 rounded-lg px-2 py-1.5 text-xs hover:bg-gray-300">+</button>
              </div>
              <div className="flex gap-1">
                <input type="date" ref={calendarInputRef} value={calendarDate} onChange={e => {
                    const val = e.target.value;
                    setCalendarDate(val);
                    if (val && !selectedDates.includes(val)) {
                      setSelectedDates(prev => [...prev, val].sort());
                      setTimeout(() => setCalendarDate(''), 0);
                    }
                  }}
                  className="border rounded-lg px-2 py-1.5 text-xs w-[130px]" />
                <button onClick={() => { if (calendarInputRef.current) { try { calendarInputRef.current.showPicker(); } catch(e) { calendarInputRef.current.focus(); calendarInputRef.current.click(); } } }} className="bg-blue-100 text-blue-700 rounded-lg px-2 py-1.5 text-xs hover:bg-blue-200">📅</button>
              </div>
            </div>
          </div>

          {/* Notes */}
          <div>
            <label className="block text-sm font-medium mb-1">הערות</label>
            <textarea value={notes} onChange={e => setNotes(e.target.value)}
              className="w-full border rounded-lg px-3 py-2 text-sm" rows={2} />
          </div>
        </div>

        {/* Save / Cancel */}
        <div className="flex gap-2 mt-4 pt-3 border-t">
          <button onClick={() => {
            onSave({
              name, category, type, participants, notes,
              dates: selectedDates,
              hotel: editingEvent?.hotel || {}
            });
          }} className="flex-1 bg-blue-600 text-white rounded-lg py-2 text-sm font-medium hover:bg-blue-700">
            {editingEvent ? 'עדכן' : 'צור אירוע'}
          </button>
          <button onClick={onClose} className="px-4 border rounded-lg py-2 text-sm hover:bg-gray-50">ביטול</button>
        </div>
      </div>
    </div>
  );
}
