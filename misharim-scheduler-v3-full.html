// HOTEL PANEL
// ============================================================
function HotelPanel({ events, setEvents, onChanged }) {
  const [selectedEvt, setSelectedEvt] = useState(null);
  const eventsWithDates = events.filter(e => e.dates.length > 0);

  const updateHotel = (eventId, field, value) => {
    setEvents(prev => prev.map(e =>
      e.id === eventId ? { ...e, hotel: { ...e.hotel, [field]: value } } : e
    ));
    if (onChanged) onChanged();
  };

  const exportHotelList = () => {
    if (typeof XLSX === 'undefined') { alert('שגיאה: ספריית XLSX לא נטענה. בדוק חיבור לאינטרנט.'); return; }
    const equipLabels = { projector: 'מקרן', whiteboard: 'לוח מחיק', flipchart: 'פליפצ\'רט', stationery: 'כלי כתיבה' };
    const data = [['אירוע', 'תאריכים', 'אנשים', 'לילות', 'חדרים יחיד', 'חדרים זוגי', 'אזור', 'איכות', 'פיצולים', 'סידור חדר', 'עזרים', 'עזרים נוספים', 'דרישות', 'כיבוד']];
    events.forEach(e => {
      if (!e.hotel || Object.keys(e.hotel).length === 0) return;
      const equip = (e.hotel.equipment || []).map(k => equipLabels[k] || k).join(', ');
      data.push([
        e.name, e.dates.join(', '), e.hotel.people || '', e.hotel.nights || '',
        e.hotel.roomsSingle || '', e.hotel.roomsDouble || '', e.hotel.area || '',
        e.hotel.quality || '', e.hotel.breakoutRooms || '', e.hotel.seatingArrangement || '',
        equip, e.hotel.equipmentNotes || '', e.hotel.requirements || '', e.hotel.catering || ''
      ]);
    });
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(data);
    // RTL is set at workbook level via setWorkbookRTL
    ws['!cols'] = [{ wch: 25 },{ wch: 30 },{ wch: 8 },{ wch: 8 },{ wch: 10 },{ wch: 10 },{ wch: 15 },{ wch: 10 },{ wch: 10 },{ wch: 18 },{ wch: 20 },{ wch: 18 },{ wch: 25 },{ wch: 20 }];
    XLSX.utils.book_append_sheet(wb, ws, 'דרישות מלון');
    setWorkbookRTL(wb);
    XLSX.writeFile(wb, 'hotel-requirements.xlsx');
  };

  return (
    <div>
      <div className="flex justify-between items-center mb-3">
        <h3 className="font-semibold text-sm">פרטי מלון</h3>
        <button onClick={exportHotelList} className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded hover:bg-green-200">
          📥 ייצוא רשימה
        </button>
      </div>

      {eventsWithDates.length === 0 && <p className="text-gray-400 text-sm text-center py-4">אין אירועים עם תאריכים</p>}

      <div className="space-y-2">
        {eventsWithDates.map(evt => (
          <div key={evt.id} className="border rounded-lg overflow-hidden">
            <button onClick={() => setSelectedEvt(selectedEvt === evt.id ? null : evt.id)}
              className="w-full text-right px-3 py-2 text-sm font-medium bg-gray-50 hover:bg-gray-100 flex justify-between items-center">
              <span>{CATEGORIES[evt.category]?.icon} {evt.name}</span>
              <span className="text-gray-400">{selectedEvt === evt.id ? '▲' : '▼'}</span>
            </button>
            {selectedEvt === evt.id && (
              <div className="p-3 space-y-2 text-xs">
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <label className="text-gray-500">אנשים</label>
                    <input type="number" value={evt.hotel?.people || ''} onChange={e => updateHotel(evt.id, 'people', Number(e.target.value))}
                      className="w-full border rounded px-2 py-1 mt-0.5" />
                  </div>
                  <div>
                    <label className="text-gray-500">לילות</label>
                    <input type="number" value={evt.hotel?.nights || ''} onChange={e => updateHotel(evt.id, 'nights', Number(e.target.value))}
                      className="w-full border rounded px-2 py-1 mt-0.5" />
                  </div>
                  <div>
                    <label className="text-gray-500">חדרים ליחיד</label>
                    <input type="number" value={evt.hotel?.roomsSingle || ''} onChange={e => updateHotel(evt.id, 'roomsSingle', Number(e.target.value))}
                      className="w-full border rounded px-2 py-1 mt-0.5" />
                  </div>
                  <div>
                    <label className="text-gray-500">חדרים לזוג</label>
                    <input type="number" value={evt.hotel?.roomsDouble || ''} onChange={e => updateHotel(evt.id, 'roomsDouble', Number(e.target.value))}
                      className="w-full border rounded px-2 py-1 mt-0.5" />
                  </div>
                </div>
                <div>
                  <label className="text-gray-500">אזור גיאוגרפי</label>
                  <input value={evt.hotel?.area || ''} onChange={e => updateHotel(evt.id, 'area', e.target.value)}
                    className="w-full border rounded px-2 py-1 mt-0.5" placeholder="צפון, מרכז, דרום..." />
                </div>
                <div>
                  <label className="text-gray-500">איכות מלון</label>
                  <select value={evt.hotel?.quality || '3-4'} onChange={e => updateHotel(evt.id, 'quality', e.target.value)}
                    className="w-full border rounded px-2 py-1 mt-0.5">
                    <option value="3">3 כוכבים</option>
                    <option value="3-4">3-4 כוכבים (מועדף)</option>
                    <option value="4">4 כוכבים</option>
                  </select>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <div>
                    <label className="text-gray-500">פיצולים / חדרי עבודה</label>
                    <input type="number" value={evt.hotel?.breakoutRooms || ''} onChange={e => updateHotel(evt.id, 'breakoutRooms', Number(e.target.value))}
                      className="w-full border rounded px-2 py-1 mt-0.5" placeholder="כמות" />
                  </div>
                  <div>
                    <label className="text-gray-500">סידור חדר ישיבות</label>
                    <input value={evt.hotel?.seatingArrangement || ''} onChange={e => updateHotel(evt.id, 'seatingArrangement', e.target.value)}
                      className="w-full border rounded px-2 py-1 mt-0.5" placeholder="שולחן U, תיאטרון, קבוצות..." />
                  </div>
                </div>
                <div>
                  <label className="text-gray-500">עזרים נדרשים</label>
                  <div className="flex flex-wrap gap-1.5 mt-1 mb-1">
                    {[
                      { key: 'projector', label: 'מקרן' },
                      { key: 'whiteboard', label: 'לוח מחיק' },
                      { key: 'flipchart', label: 'פליפצ\'רט' },
                      { key: 'stationery', label: 'כלי כתיבה' }
                    ].map(item => {
                      const equipment = evt.hotel?.equipment || [];
                      const isChecked = equipment.includes(item.key);
                      return (
                        <label key={item.key} className={`inline-flex items-center gap-1 px-2 py-1 rounded-full text-[11px] cursor-pointer transition ${isChecked ? 'bg-blue-100 text-blue-800 font-medium' : 'bg-gray-100 text-gray-600'}`}>
                          <input type="checkbox" className="hidden" checked={isChecked}
                            onChange={() => {
                              const newEquip = isChecked ? equipment.filter(e => e !== item.key) : [...equipment, item.key];
                              updateHotel(evt.id, 'equipment', newEquip);
                            }} />
                          {isChecked ? '✓' : '○'} {item.label}
                        </label>
                      );
                    })}
                  </div>
                  <input value={evt.hotel?.equipmentNotes || ''} onChange={e => updateHotel(evt.id, 'equipmentNotes', e.target.value)}
                    className="w-full border rounded px-2 py-1 mt-0.5" placeholder="עזרים נוספים..." />
                </div>
                <div>
                  <label className="text-gray-500">דרישות נוספות</label>
                  <input value={evt.hotel?.requirements || ''} onChange={e => updateHotel(evt.id, 'requirements', e.target.value)}
                    className="w-full border rounded px-2 py-1 mt-0.5" placeholder="אסתטי, שירות טוב..." />
                </div>
                <div>
                  <label className="text-gray-500">כיבוד וארוחות</label>
                  <input value={evt.hotel?.catering || ''} onChange={e => updateHotel(evt.id, 'catering', e.target.value)}
                    className="w-full border rounded px-2 py-1 mt-0.5" placeholder="ארוחת בוקר, צהריים..." />
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ============================================================
// MARKDOWN FORMATTER
// ============================================================
function formatMarkdown(text) {
  if (!text) return '';
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  // Bold: **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Bullet lists: lines starting with - or •
  html = html.replace(/^[-•]\s+(.+)$/gm, '<span style="display:block;padding-right:12px;text-indent:-8px">• $1</span>');
  // Numbered lists: lines starting with digit.
  html = html.replace(/^(\d+)\.\s+(.+)$/gm, '<span style="display:block;padding-right:16px;text-indent:-12px">$1. $2</span>');
  // Line breaks
  html = html.replace(/\n/g, '<br/>');
  return html;
}

// ============================================================
// AI PANEL
// ============================================================
function AiPanel({ apiKey, chatHistory, chatInput, setChatInput, sendAiMessage, isAiLoading, chatEndRef }) {
  return (
    <div className="flex flex-col h-full">
      {!apiKey && (
        <div className="bg-yellow-50 border border-yellow-200 rounded-lg p-3 mb-3 text-xs text-yellow-800">
          ⚠️ נא להזין API Key בלשונית "הגדרות" כדי להשתמש בעוזר AI
        </div>
      )}

      <div className="flex-1 overflow-y-auto space-y-2 mb-3 min-h-0">
        {chatHistory.length === 0 && (
          <div className="text-center text-gray-400 text-xs py-8">
            <p className="text-2xl mb-2">🤖</p>
            <p>שאל אותי כל דבר!</p>
            <p className="mt-1 text-gray-300">לדוגמה: "שבץ פורום ארגונים בכל יום שלישי שני בחודש"</p>
          </div>
        )}
        {chatHistory.map((msg, i) => (
          <div key={i} className={`flex ${msg.role === 'user' ? 'justify-start' : 'justify-end'}`}>
            {msg.role === 'user' ? (
              <div className="chat-bubble chat-user" style={{ whiteSpace: 'pre-wrap' }}>
                {msg.content}
              </div>
            ) : (
              <div className="chat-bubble chat-ai"
                dangerouslySetInnerHTML={{ __html: formatMarkdown(msg.content) }} />
            )}
          </div>
        ))}
        {isAiLoading && (
          <div className="flex justify-end">
            <div className="chat-bubble chat-ai">
              <span className="animate-pulse">⏳ חושב...</span>
            </div>
          </div>
        )}
        <div ref={chatEndRef} />
      </div>

      <div className="flex gap-2">
        <input value={chatInput} onChange={e => setChatInput(e.target.value)}
          onKeyDown={e => { if (e.key === 'Enter' && chatInput.trim()) sendAiMessage(chatInput.trim()); }}
          className="flex-1 border rounded-lg px-3 py-2 text-sm" placeholder="הקלד הודעה..."
          disabled={isAiLoading || !apiKey} />
        <button onClick={() => { if (chatInput.trim()) sendAiMessage(chatInput.trim()); }}
          disabled={isAiLoading || !apiKey || !chatInput.trim()}
          className="bg-blue-600 text-white rounded-lg px-4 py-2 text-sm disabled:opacity-50 hover:bg-blue-700">
          שלח
        </button>
      </div>
    </div>
  );
}

// ============================================================
// SETTINGS PANEL
// ============================================================
function SettingsPanel({ apiKey, setApiKey, ghToken, setGhToken, syncStatus, lastSync, saveProject, loadProject, refreshFromGithub, exportToExcel, exportForRashel, blockedDays, unblockDay, customHolidays, removeCustomHoliday, hiddenHolidays, setHiddenHolidays }) {
  const syncLabels = {
    idle: { text: 'ממתין', color: 'gray' },
    loading: { text: 'טוען...', color: 'blue' },
    saving: { text: 'שומר...', color: 'blue' },
    synced: { text: 'מסונכרן', color: 'green' },
    'no-remote': { text: 'אין נתונים מרוחקים', color: 'yellow' },
    offline: { text: 'אופליין — נתונים מקומיים', color: 'red' },
    error: { text: 'שגיאת סנכרון', color: 'red' },
  };
  const sync = syncLabels[syncStatus] || syncLabels.idle;

  return (
    <div className="space-y-4">
      {/* Sync status */}
      <div className={`bg-${sync.color}-50 border border-${sync.color}-200 rounded-lg p-3`}>
        <div className="flex items-center justify-between mb-2">
          <h3 className="font-semibold text-sm">☁️ סנכרון</h3>
          <span className={`text-xs font-medium px-2 py-0.5 rounded-full bg-${sync.color}-100 text-${sync.color}-700`}>{sync.text}</span>
        </div>
        {lastSync && <p className="text-xs text-gray-500">עדכון אחרון: {lastSync.toLocaleTimeString('he-IL')}</p>}
        <button onClick={refreshFromGithub} disabled={syncStatus === 'loading' || syncStatus === 'saving'}
          className="mt-2 w-full bg-blue-500 text-white rounded-lg py-1.5 text-sm hover:bg-blue-600 transition font-medium disabled:opacity-50">
          🔄 רענן מהשרת
        </button>
      </div>

      {/* GitHub Token */}
      <div>
        <h3 className="font-semibold text-sm mb-2">🔐 GitHub Token</h3>
        <input type="password" value={ghToken} onChange={e => setGhToken(e.target.value)}
          className="w-full border rounded-lg px-3 py-2 text-sm" placeholder="ghp_..." />
        <p className="text-xs text-gray-400 mt-1">נדרש לשמירה בלבד. קריאה עובדת ללא טוקן.</p>
      </div>

      {/* API Key */}
      <div>
        <h3 className="font-semibold text-sm mb-2">🔑 API Key (Anthropic)</h3>
        <input type="password" value={apiKey} onChange={e => setApiKey(e.target.value)}
          className="w-full border rounded-lg px-3 py-2 text-sm" placeholder="sk-ant-..." />
        <p className="text-xs text-gray-400 mt-1">נשמר ב-localStorage בלבד</p>
      </div>

      {/* Project actions */}
      <div>
        <h3 className="font-semibold text-sm mb-2">💾 פרויקט</h3>
        <div className="grid grid-cols-2 gap-2">
          <button onClick={saveProject} className="bg-green-100 text-green-700 rounded-lg py-2 text-sm hover:bg-green-200 transition font-medium">
            ☁️ שמור וסנכרן
          </button>
          <button onClick={loadProject} className="bg-blue-100 text-blue-700 rounded-lg py-2 text-sm hover:bg-blue-200 transition font-medium">
            📤 טען מקובץ
          </button>
          <button onClick={exportToExcel} className="col-span-2 bg-purple-100 text-purple-700 rounded-lg py-2 text-sm hover:bg-purple-200 transition font-medium">
            📊 ייצוא לאקסל
          </button>
          <button onClick={exportForRashel} className="col-span-2 bg-indigo-100 text-indigo-700 rounded-lg py-2 text-sm hover:bg-indigo-200 transition font-medium">
            📋 ייצוא אירועים לרשל
          </button>
        </div>
      </div>

      {/* Blocked days */}
      <div>
        <h3 className="font-semibold text-sm mb-2">🚫 ימים חסומים</h3>
        {Object.keys(blockedDays).length === 0 && <p className="text-gray-400 text-xs">אין ימים חסומים (Shift+לחיצה על תא)</p>}
        <div className="space-y-1">
          {Object.entries(blockedDays).sort().map(([date, reason]) => (
            <div key={date} className="flex justify-between items-center text-xs bg-red-50 rounded px-2 py-1">
              <span>{date}: {reason}</span>
              <button onClick={() => unblockDay(date)} className="text-red-500 hover:text-red-700">✕</button>
            </div>
          ))}
        </div>
      </div>

      {/* Custom holidays */}
      <div>
        <h3 className="font-semibold text-sm mb-2">📅 חגים ידניים</h3>
        {Object.keys(customHolidays).length === 0 && <p className="text-gray-400 text-xs">אין חגים ידניים (Ctrl+לחיצה על תא)</p>}
        <div className="space-y-1">
          {Object.entries(customHolidays).sort().map(([date, hol]) => (
            <div key={date} className="flex justify-between items-center text-xs bg-green-50 rounded px-2 py-1">
              <span>{date}: {hol.name}</span>
              <button onClick={() => removeCustomHoliday(date)} className="text-red-500 hover:text-red-700">✕</button>
            </div>
          ))}
        </div>
      </div>

      {/* Hidden holidays */}
      {Object.keys(hiddenHolidays).length > 0 && (
      <div>
        <h3 className="font-semibold text-sm mb-2">👁 חגים מוסתרים</h3>
        <div className="space-y-1">
          {Object.keys(hiddenHolidays).sort().map(key => {
            const [date, ...rest] = key.split('_');
            const name = rest.join('_');
            return (
              <div key={key} className="flex justify-between items-center text-xs bg-yellow-50 rounded px-2 py-1">
                <span>{date}: {name}</span>
                <button onClick={() => setHiddenHolidays(prev => { const n = { ...prev }; delete n[key]; return n; })} className="text-green-500 hover:text-green-700">החזר</button>
              </div>
            );
          })}
        </div>
        <button onClick={() => setHiddenHolidays({})} className="mt-1 text-xs text-blue-500 hover:text-blue-700">החזר הכל</button>
      </div>
      )}

      {/* Instructions */}
      <div className="bg-gray-50 rounded-lg p-3 text-xs text-gray-500 space-y-1">
        <p className="font-semibold text-gray-600">📖 הוראות שימוש:</p>
        <p>• <strong>דבל קליק</strong> על תא = ניהול יום (חגים/אירועים/הערות/חסימות)</p>
        <p>• <strong>דבל קליק</strong> על תא ריק = אירוע חדש</p>
        <p>• בחר אירוע בצד ← לחץ על תא בגאנט לשיבוץ</p>
        <p>• <kbd className="bg-gray-200 px-1 rounded">Shift</kbd>+לחיצה = חסום/בטל חסימה</p>
        <p>• <kbd className="bg-gray-200 px-1 rounded">Ctrl</kbd>+לחיצה = הוסף חג ידני</p>
        <p>• רחף על תא לראות פרטים</p>
        <p>• ⏩ = דחייה | ❌ = ביטול תאריך</p>
      </div>
    </div>
  );
}
